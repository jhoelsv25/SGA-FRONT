<section
  class="relative overflow-hidden rounded-[2rem] border border-border bg-card p-6 shadow-sm lg:p-8"
>
  <div
    class="pointer-events-none absolute -right-10 -top-12 h-36 w-36 rounded-full bg-primary/10 blur-[55px]"
  ></div>
  <div
    class="pointer-events-none absolute -left-12 bottom-0 h-28 w-28 rounded-full bg-secondary/10 blur-[45px]"
  ></div>

  <div class="relative z-10 flex flex-col gap-5 xl:flex-row xl:items-start xl:justify-between">
    <div>
      <div class="flex flex-wrap items-center gap-2">
        <span
          class="rounded-full border border-primary/20 bg-primary/10 px-3 py-1 text-[10px] font-black uppercase tracking-[0.16em] text-primary"
        >
          {{ roleBadge() }}
        </span>
        <span
          class="rounded-full border border-border bg-background px-3 py-1 text-[10px] font-semibold uppercase tracking-[0.16em] text-muted-foreground"
        >
          Ajustes de cuenta
        </span>
      </div>
      <h1 class="mt-3 text-3xl font-semibold tracking-tight text-foreground">
        Configuracion de cuenta
      </h1>
      <p class="mt-2 max-w-3xl text-sm leading-6 text-muted-foreground">
        Preferencias, seguridad y actividad conectadas a la cuenta autenticada.
      </p>
    </div>

    <div class="grid min-w-[280px] grid-cols-2 gap-3">
      @for (item of pills(); track item.label) {
        <div class="rounded-2xl border border-border bg-background/80 px-4 py-3">
          <p class="text-[10px] font-black uppercase tracking-[0.16em] text-muted-foreground">
            {{ item.label }}
          </p>
          <p class="mt-2 text-sm font-semibold text-foreground">{{ item.value }}</p>
        </div>
      }
    </div>
  </div>

  <div class="relative z-10 mt-5 flex flex-wrap gap-2">
    @for (section of sections(); track section.id) {
      <button
        type="button"
        class="rounded-full border px-3 py-1.5 text-xs font-semibold transition"
        [class.border-primary]="activeSection() === section.id"
        [class.bg-primary]="activeSection() === section.id"
        [class.text-primary-foreground]="activeSection() === section.id"
        [class.border-border]="activeSection() !== section.id"
        [class.bg-background]="activeSection() !== section.id"
        [class.text-muted-foreground]="activeSection() !== section.id"
        (click)="sectionChange.emit(section.id)"
      >
        {{ section.label }}
      </button>
    }
  </div>
</section>
