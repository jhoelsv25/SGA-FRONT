<sga-card
  class="group flex flex-col h-full hover:shadow-xl hover:-translate-y-1.5 transition-all duration-300 border-base-200 overflow-hidden bg-base-100"
>
  <div class="flex flex-col space-y-1.5 p-6 pb-3 border-b border-base-200 bg-base-200/10">
    <div class="flex justify-between items-start">
      <div
        class="p-2.5 rounded-xl bg-primary/10 text-primary border border-primary/20 shadow-sm transition-colors"
      >
        <i class="fas fa-book-open text-lg"></i>
      </div>
      <div class="flex gap-1 opacity-0 group-hover:opacity-100 transition-opacity">
        <button
          sgaButton
          variant="ghost"
          size="sm"
          class="rounded-lg h-8 w-8 p-0"
          (click)="edit.emit(subjectArea())"
        >
          <i class="fas fa-edit text-xs"></i>
        </button>
        <button
          sgaButton
          variant="ghost"
          size="sm"
          class="rounded-lg h-8 w-8 p-0 text-error hover:bg-error/10"
          (click)="delete.emit(subjectArea())"
        >
          <i class="fas fa-trash text-xs"></i>
        </button>
      </div>
    </div>
    <h2
      class="text-2xl font-semibold leading-none tracking-tight mt-4 text-xl font-bold text-base-content group-hover:text-primary transition-colors"
    >
      {{ subjectArea().name }}
    </h2>
    <p class="text-sm font-mono text-base-content/60 mt-0.5">{{ subjectArea().code }}</p>
    <div class="flex flex-wrap items-center gap-2 mt-2">
      <span
        class="text-[10px] font-black uppercase tracking-widest px-2 py-0.5 rounded border"
        [ngClass]="getTypeColor(subjectArea().type)"
      >
        {{ getTypeLabel(subjectArea().type) }}
      </span>
      <span
        class="text-[10px] font-black uppercase tracking-widest px-2 py-0.5 rounded border"
        [ngClass]="getStatusColor(subjectArea().status)"
      >
        {{ getStatusLabel(subjectArea().status) }}
      </span>
    </div>
  </div>

  <div class="p-6 pt-5 grow">
    @if (subjectArea().description) {
      <p class="text-sm text-base-content/60 leading-relaxed line-clamp-3">
        {{ subjectArea().description }}
      </p>
    } @else {
      <p class="text-sm text-base-content/40 italic">Sin descripción</p>
    }
  </div>
</sga-card>
