<div class="p-6 space-y-6">
  <z-list-toolbar
    title="Horarios"
    icon="fas fa-calendar-alt"
    description="Vista semanal de horarios por curso y sección"
    [searchPlaceholder]="'Buscar por curso o aula...'"
    [filterCount]="0"
    [showFilter]="false"
    (searchChange)="onSearch($event)"
    (refresh)="onRefresh()"
  >
    <div list-toolbar-actions class="flex items-center gap-2">
      <z-dropdown [items]="actionDropdownItems()">
        <button
          dropdown-trigger
          class="flex items-center justify-center w-10 h-10 rounded-2xl border border-base-200 bg-base-100 hover:bg-base-200 transition-colors text-base-content/60 hover:text-primary"
          aria-label="Más acciones"
          type="button"
        >
          <i class="fas fa-ellipsis-h"></i>
        </button>
      </z-dropdown>
    </div>
  </z-list-toolbar>

  <sga-schedule-calendar
    [schedules]="filteredData()"
    [loading]="loading()"
    (edit)="editSchedule($event)"
    (delete)="deleteSchedule($event)"
    (create)="openForm()"
   />
</div>
