<div class="p-6 space-y-4">
  <div class="relative z-30">
  <sga-list-toolbar
    title="Docentes"
    icon="fas fa-chalkboard-teacher"
    description="Gestión completa de docentes"
    [searchPlaceholder]="'Buscar por código, especialidad o título...'"
    [filterCount]="filterCount()"
    (searchChange)="onSearch($event)"
    (refresh)="onRefresh()"
  >
    <div list-toolbar-actions class="flex items-center gap-2">
      <sga-dropdown [items]="toolbarMoreItems()">
        <button
          sga-dropdown-trigger
          type="button"
          class="flex h-9 w-9 items-center justify-center rounded-full border border-base-200 bg-base-100 text-base-content/70 transition hover:bg-base-200 hover:text-primary shadow-sm"
          aria-label="Más acciones"
        >
          <i class="fas fa-ellipsis-h"></i>
        </button>
      </sga-dropdown>
    </div>

    <div list-toolbar-filter class="space-y-3 p-1">
      <p class="text-sm font-semibold text-base-content">Filtros docentes</p>

      <div class="grid gap-2">
        <p class="text-xs font-medium text-base-content/70">Tipo de contrato</p>
        <sga-select
          [options]="contractTypeOptions"
          [value]="filterContractType()"
          [searchable]="false"
          [customClass]="'!border-base-200/50 !bg-base-100/70 !shadow-none hover:!border-base-200'"
          (valueChange)="onFilterContractType($event)"
        />
      </div>

      <div class="grid gap-2">
        <p class="text-xs font-medium text-base-content/70">Régimen laboral</p>
        <sga-select
          [options]="laborRegimeOptions"
          [value]="filterLaborRegime()"
          [searchable]="false"
          [customClass]="'!border-base-200/50 !bg-base-100/70 !shadow-none hover:!border-base-200'"
          (valueChange)="onFilterLaborRegime($event)"
        />
      </div>

      <div class="grid gap-2">
        <p class="text-xs font-medium text-base-content/70">Carga laboral</p>
        <sga-select
          [options]="workloadTypeOptions"
          [value]="filterWorkloadType()"
          [searchable]="false"
          [customClass]="'!border-base-200/50 !bg-base-100/70 !shadow-none hover:!border-base-200'"
          (valueChange)="onFilterWorkloadType($event)"
        />
      </div>

      <div class="grid gap-2">
        <p class="text-xs font-medium text-base-content/70">Estado laboral</p>
        <sga-select
          [options]="employmentStatusOptions"
          [value]="filterEmploymentStatus()"
          [searchable]="false"
          [customClass]="'!border-base-200/50 !bg-base-100/70 !shadow-none hover:!border-base-200'"
          (valueChange)="onFilterEmploymentStatus($event)"
        />
      </div>

      <button
        type="button"
        sgaButton
        variant="outline"
        size="sm"
        class="w-full"
        [disabled]="filterCount() === 0"
        (click)="clearFilters()"
      >
        Limpiar filtros
      </button>
    </div>
  </sga-list-toolbar>
  </div>

  <div class="relative z-10">
    <sga-data-source
    [data]="data()"
    [columns]="columns()"
    [loading]="loading()"
    [pagination]="pagination()"
    [actions]="rowActions()"
    [showToolbar]="false"
    (actionClick)="onRowAction($event)"
    (sortChange)="onSort($event)"
    (pageChange)="onPageChange($event)"
  />
  </div>
</div>
