<div class="space-y-10 animate-in fade-in slide-in-from-bottom-8 duration-1000">
  <sga-classroom-tasks-stats
    [pendingCount]="pendingCount()"
    [deliveredCount]="deliveredCount()"
    [gradedCount]="gradedCount()"
    [lateCount]="lateCount()"
  />

  <sga-classroom-tasks-header
    [pageLabel]="pageLabel()"
    [totalVisibleTasks]="filteredTasks().length"
    [canCreateTask]="canCreateTask()"
    (onCreate)="openCreateTask()"
  />

  <sga-classroom-tasks-filters
    [(search)]="search"
    (searchChange)="onSearchChange($event)"
    (onClear)="clearSearch()"
  />

  @if (!loading() && filteredTasks().length === 0) {
    <div
      class="py-24 flex flex-col items-center justify-center text-center bg-base-100/50 rounded-[3rem] border border-dashed border-base-300"
    >
      <div
        class="w-20 h-20 bg-base-200/50 rounded-3xl flex items-center justify-center text-base-content/10 mb-6"
      >
        <i class="fa-solid fa-list-check text-3xl"></i>
      </div>
      <p class="text-xl font-black text-base-content/60">No hay tareas pendientes</p>
      <p class="mt-2 text-sm text-base-content/40 font-medium max-w-xs">
        ¡Excelente! Estás al día con todas tus actividades del aula.
      </p>
    </div>
  } @else {
    <div class="grid grid-cols-1 gap-6">
      @for (task of filteredTasks(); track task.id; let i = $index) {
        <sga-classroom-task-item
          [task]="task"
          [sectionCourseId]="sectionCourseId()"
          [canCreateTask]="canCreateTask()"
          [canSubmitTask]="canSubmitTask()"
          [canInspectStudentSubmissions]="canInspectStudentSubmissions()"
          [canReviewTask]="canReviewTask()"
          [canCommentTask]="canCommentTask()"
          [profileType]="profileType()"
          [currentUserId]="currentUserId()"
          (onEdit)="openEditTask($event)"
          (onDelete)="deleteTask($event)"
          (onRefresh)="loadTasks()"
        />
      }
    </div>

    @if (loading() || loadingMore()) {
      <div class="py-8 flex items-center justify-center">
        <div
          class="h-10 w-10 rounded-full border-2 border-primary/20 border-t-primary animate-spin"
        ></div>
      </div>
    }
  }
</div>
