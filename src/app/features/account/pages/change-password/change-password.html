<article
  class="max-w-xl flex flex-col shadow hover:shadow-2xl duration-300 shadow-primary/35 mx-auto mt-10 justify-center rounded-4xl items-center"
>
  <div
    class="border-border/70 border-b p-6 text-center flex flex-col items-center gap-2 justify-center"
  >
    <z-icon zType="shield" class="size-12 text-primary" />
    <h2 class="text-xl font-semibold text-foreground">Actualizar credenciales</h2>
    <p class="mt-1 text-sm text-muted-foreground">
      Usa una contrasena nueva y evita repetir claves antiguas.
    </p>
  </div>

  <form [formGroup]="form" class="space-y-5 p-6" (ngSubmit)="submit()">
    <div class="space-y-1">
      <label class="text-sm font-medium text-foreground" for="currentPassword"
        >Contrasena actual</label
      >
      <input
        z-input
        id="currentPassword"
        type="password"
        formControlName="currentPassword"
        placeholder="Ingresa tu contrasena actual"
      />
    </div>

    <div class="space-y-1">
      <label class="text-sm font-medium text-foreground" for="newPassword">Nueva contrasena</label>
      <input
        z-input
        id="newPassword"
        type="password"
        formControlName="newPassword"
        placeholder="Minimo 6 caracteres"
      />
    </div>

    <div class="space-y-1">
      <label class="text-sm font-medium text-foreground" for="confirmPassword"
        >Confirmar nueva contrasena</label
      >
      <input
        z-input
        id="confirmPassword"
        type="password"
        formControlName="confirmPassword"
        placeholder="Repite la nueva contrasena"
      />
    </div>

    @if (error()) {
      <div
        class="rounded-xl border border-destructive/20 bg-destructive/5 px-4 py-3 text-sm text-destructive"
      >
        {{ error() }}
      </div>
    }

    @if (success()) {
      <div
        class="rounded-xl border border-emerald-500/20 bg-emerald-500/5 px-4 py-3 text-sm text-emerald-700 dark:text-emerald-400"
      >
        {{ success() }}
      </div>
    }

    <div class="flex flex-wrap justify-end gap-3 pt-2">
      <a
        routerLink="/account/settings"
        class="inline-flex items-center gap-2 rounded-2xl border border-border bg-background px-4 py-2.5 text-sm font-semibold text-foreground hover:bg-accent transition-colors"
      >
        <z-icon zType="arrow-left" class="size-4" />
        Volver a configuracion
      </a>
      <button
        type="submit"
        class="inline-flex items-center gap-2 rounded-2xl bg-primary px-4 py-2.5 text-sm font-semibold text-primary-foreground hover:bg-primary/90 transition-colors"
        [disabled]="form.invalid || loading()"
      >
        <z-icon zType="save" class="size-4" />
        {{ loading() ? 'Actualizando...' : 'Actualizar contrasena' }}
      </button>
    </div>
  </form>
</article>
