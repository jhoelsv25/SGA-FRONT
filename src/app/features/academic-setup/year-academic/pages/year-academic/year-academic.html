<div class="p-6 space-y-6">
  <sga-list-toolbar
    title="Año Académico"
    icon="fas fa-calendar-alt"
    description="Gestionar años académicos"
    [searchPlaceholder]="'Buscar años académicos...'"
    [filterCount]="filterCount()"
    (searchChange)="onSearch($event)"
    (refresh)="onRefresh()"
  >
    <div list-toolbar-actions class="flex items-center gap-2">
      <sga-dropdown [items]="actionDropdownItems()">
        <button
          sga-dropdown-trigger
          class="flex items-center justify-center w-10 h-10 rounded-2xl border border-base-200 bg-base-100 hover:bg-base-200 transition-colors text-base-content/60 hover:text-primary"
          aria-label="Más acciones"
          type="button"
        >
          <i class="fas fa-ellipsis-h"></i>
        </button>
      </sga-dropdown>
    </div>
    <div list-toolbar-filter class="space-y-3 p-1">
      <p class="text-sm font-semibold text-base-content">Filtrar por estado</p>
      <sga-select
        [options]="statusOptions"
        [value]="filterStatus() || null"
        [placeholder]="'Todos'"
        [clearable]="true"
        [searchable]="false"
        (valueChange)="onFilterStatus($event)"
      />
    </div>
  </sga-list-toolbar>

  <div
    class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-3 gap-6 md:gap-8 mt-8 animate-in fade-in slide-in-from-bottom-4 duration-500"
  >
    @if (loading() && !data().length) {
      @for (i of skeletonItems; track i) {
        <sga-skeleton [customClass]="'h-[260px] w-full rounded-4xl border border-base-200'" />
      }
    } @else {
      @for (academicYear of filteredData(); track academicYear.id) {
        <sga-year-academic-card
          [year]="academicYear"
          (viewDetail)="goToDetail(academicYear)"
          (edit)="editYear(academicYear)"
          (delete)="deleteYear(academicYear)"
          (createPeriod)="openPeriodForm(academicYear)"
        />
      } @empty {
        <div class="col-span-full">
          <sga-empty-state
            iconClass="fas fa-calendar-alt"
            title="Sin años académicos"
            description="Aún no hay años académicos configurados. Crea el primero para definir períodos y fechas del curso."
            actionLabel="Crear primer año académico"
            (action)="createFromEmpty()"
          />
        </div>
      }
    }
  </div>
</div>
