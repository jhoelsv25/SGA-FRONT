<label class="inline-flex cursor-pointer select-none items-center gap-2 peer-disabled:cursor-not-allowed peer-disabled:opacity-70">
  <span class="relative flex shrink-0">
    <input
      type="checkbox"
      class="peer absolute size-4 cursor-pointer opacity-0"
      [checked]="isChecked()"
      (change)="onToggle($event)"
      tabindex="0"
    />
    <span
      class="flex size-4 shrink-0 items-center justify-center rounded-[4px] border border-input bg-background text-primary shadow-xs transition-colors peer-focus-visible:outline-none peer-focus-visible:ring-2 peer-focus-visible:ring-ring peer-focus-visible:ring-offset-2 peer-focus-visible:ring-offset-background peer-disabled:cursor-not-allowed peer-disabled:opacity-50"
      [class.border-primary]="isChecked()"
      [class.bg-primary]="isChecked()"
      [class.text-primary-foreground]="isChecked()"
    >
      @if (isChecked()) {
        <svg class="size-2.5 shrink-0" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="20 6 9 17 4 12" />
        </svg>
      }
    </span>
  </span>
  @if (label()) {
    <span class="text-sm font-medium leading-none">{{ label() }}</span>
  }
  <ng-content />
</label>
