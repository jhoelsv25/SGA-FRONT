<div class="flex flex-col gap-6">
  <!-- Header -->
  <div class="flex justify-between items-center bg-base-100 p-6 rounded-xl border border-base-200 shadow-sm animate-in fade-in slide-in-from-top-4 duration-500">
    <div>
      <h1 class="text-2xl font-bold text-base-content tracking-tight">Gestión de Roles</h1>
      <p class="text-base-content/60 text-sm">Administra los perfiles de acceso y perimisos del sistema.</p>
    </div>
    <button sgaButton color="primary" (click)="openCreateDialog()">
      <i class="fas fa-plus mr-2"></i> Nuevo Rol
    </button>
  </div>

  <!-- Lista de Roles -->
  <div class="roles-grid animate-in fade-in slide-in-from-bottom-4 duration-500">
    @if (loading() && !roles().length) {
      @for (i of [1,2,3,4]; track i) {
        <div class="h-[240px] w-full rounded-2xl bg-base-200/50 animate-pulse border border-base-200"></div>
      }
    } @else {
      @for (role of roles(); track role.id) {
        <sga-role-card
          [role]="role"
          (roleSelected)="selectRole($event)"
          (editClicked)="editRole($event)"
          (deleteClicked)="deleteRole($event)"
        ></sga-role-card>
      } @empty {
        <sga-empty-state
          class="col-span-full"
          title="Sin roles registrados"
          description="Aún no has creado ningún rol. Define los perfiles de acceso para los usuarios del sistema."
          iconClass="fas fa-shield-alt"
          actionLabel="Crear nuevo rol"
          (action)="openCreateDialog()"
        />
      }
    }
  </div>
</div>
