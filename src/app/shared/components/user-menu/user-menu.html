<div class="relative user-menu-container w-full">
  <!-- Trigger -->
  <button
    (click)="toggleMenu()"
    class="w-full flex items-center gap-3 p-1 rounded-md transition-all duration-200"
    [class.justify-center]="isCollapsed()"
  >
    <div class="relative shrink-0 flex items-center justify-center">
      @if (avatar(); as img) {
        <img
          [src]="img"
          alt="Avatar"
          class="w-8 h-8 rounded-full object-cover border border-base-300 shadow-sm"
        />
      } @else {
        <div
          class="w-8 h-8 flex items-center justify-center rounded-full bg-primary text-primary-50 text-xs font-bold border border-primary/20"
        >
          {{ initials() }}
        </div>
      }
      <!-- Status dot -->
      <div class="absolute -bottom-0.5 -right-0.5 w-2.5 h-2.5 bg-success rounded-full border-2 border-base-100"></div>
    </div>

    @if (!isCollapsed()) {
      <div class="flex-1 text-left min-w-0 transition-all duration-200">
        <p class="text-xs font-bold text-base-content truncate leading-tight">
          {{ name() }}
        </p>
        <p class="text-[10px] text-base-content/50 truncate font-medium uppercase tracking-wider">{{ role() }}</p>
      </div>
      <i
        class="fa-solid fa-chevron-up text-[10px] text-base-content/30 transition-transform duration-300 shrink-0"
        [class.rotate-180]="open()"
      ></i>
    }
  </button>

  <!-- Dropdown (Opens Upward/Sideways) -->
  <div
    [ngClass]="open() ? 'menu-anim-enter' : 'menu-anim-leave'"
    class="absolute z-50 overflow-hidden bg-base-100 rounded-xl shadow-2xl border border-base-200 shadow-primary/5 origin-bottom"
    [class.bottom-full]="!isCollapsed()"
    [class.mb-4]="!isCollapsed()"
    [class.left-0]="!isCollapsed()"
    [class.w-64]="!isCollapsed()"
    [class.left-[calc(100%+0.5rem)]]="isCollapsed()"
    [class.bottom-0]="isCollapsed()"
    [class.w-56]="isCollapsed()"
    [class.origin-bottom-left]="isCollapsed()"
  >
    <!-- Header -->
    <div class="p-4 border-b border-base-200/60 bg-base-50/50">
      <div class="flex items-center gap-3 mb-3">
        <div class="w-10 h-10 rounded-full bg-primary/10 flex items-center justify-center text-primary font-bold">
           {{ initials() }}
        </div>
        <div class="min-w-0">
          <h3 class="font-bold text-sm text-base-content leading-tight truncate">{{ name() }}</h3>
          <p class="text-xs text-base-content/40 font-medium truncate uppercase tracking-wide">{{ role() }}</p>
        </div>
      </div>
      <div class="flex items-center gap-1.5 text-[10px] text-base-content/40 bg-base-100 border border-base-200 py-1 px-2 rounded-md w-fit font-mono">
        <i class="fa-solid fa-id-badge"></i>
        <span>{{ code() }}</span>
      </div>
    </div>

    <!-- Stats -->
    <div class="grid grid-cols-3 divide-x divide-base-200/50 border-b border-base-200/60 bg-base-100">
      <div class="p-3 text-center">
        <p class="text-xs font-bold text-base-content">{{ stats().courses }}</p>
        <p class="text-[10px] text-base-content/40 font-medium uppercase">Cursos</p>
      </div>
      <div class="p-3 text-center">
        <p class="text-xs font-bold text-base-content">{{ stats().students }}</p>
        <p class="text-[10px] text-base-content/40 font-medium uppercase">Alumnos</p>
      </div>
      <div class="p-3 text-center">
        <p class="text-xs font-bold text-base-content">{{ stats().average }}</p>
        <p class="text-[10px] text-base-content/40 font-medium uppercase">Prom.</p>
      </div>
    </div>

    <!-- Actions -->
    <div class="p-1.5 space-y-0.5">
      @for (item of actions(); track $index) {
        <button
          (click)="handleAction(item)"
          class="w-full flex items-center gap-3 px-3 py-2 text-sm text-base-content/70 hover:text-base-content hover:bg-base-200/60 rounded-md transition-all group"
        >
          <div class="w-4 flex justify-center text-primary/60 group-hover:text-primary transition-colors">
            @if (item.type === 'theme') {
               <i class="fa-solid" [class]="item.icon === 'theme-light' ? 'fa-sun' : item.icon === 'theme-dark' ? 'fa-moon' : 'fa-laptop'"></i>
            } @else {
              <i [class]="item.icon"></i>
            }
          </div>
          <span class="font-medium text-xs">{{ item.label }}</span>
        </button>
      }
    </div>

    <!-- Logout button -->
    <div class="p-1.5 border-t border-base-200/60 bg-base-50/10">
      <button
        (click)="handleAction({ label: 'Cerrar Sesión', type: 'logout' })"
        class="w-full flex items-center justify-center gap-2 px-3 py-2 text-xs font-bold text-error hover:bg-error/10 rounded-md transition-all active:scale-95"
      >
        <i class="fa-solid fa-right-from-bracket"></i>
        <span>Cerrar Sesión</span>
      </button>
    </div>
  </div>
</div>
