<sga-header-detail
  [config]="headerConfig()"
  [actions]="headerActions()"
  (action)="onHeaderAction($event)"
  (refresh)="onRefresh()"
/>

<div class="p-6">
  <div
    class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-3 gap-6 animate-in fade-in slide-in-from-bottom-4 duration-500"
  >
    @if (loading() && !data().length) {
      @for (i of skeletonItems; track i) {
        <sga-skeleton [customClass]="'h-[260px] w-full rounded-2xl border border-base-200'" />
      }
    } @else {
      @for (period of data(); track period.id) {
        <sga-period-card
          [period]="period"
          (edit)="editPeriod(period)"
          (delete)="deletePeriod(period)"
        />
      } @empty {
        <div class="col-span-full">
          <sga-empty-state
            iconClass="fas fa-layer-group"
            title="Sin períodos académicos"
            description="Aún no hay períodos configurados. Crea trimestres, bimestres o semestres para el año académico."
            actionLabel="Crear primer período"
            (action)="createFromEmpty()"
          />
        </div>
      }
    }
  </div>
</div>
