<div class="p-6 space-y-6">
  <sga-list-toolbar
    title="Competencias"
    icon="fas fa-bullseye"
    description="Gestionar competencias"
    [searchPlaceholder]="'Buscar competencias por nombre o código...'"
    [showFilter]="false"
    (searchChange)="onSearch($event)"
    (refresh)="onRefresh()"
  >
    <div list-toolbar-actions class="flex items-center gap-2">
      <sga-dropdown [items]="actionDropdownItems()">
        <button
          sga-dropdown-trigger
          class="flex items-center justify-center w-10 h-10 rounded-2xl border border-base-200 bg-base-100 hover:bg-base-200 transition-colors text-base-content/60 hover:text-primary"
          aria-label="Más acciones"
          type="button"
        >
          <i class="fas fa-ellipsis-h"></i>
        </button>
      </sga-dropdown>
    </div>
  </sga-list-toolbar>

  <div
    class="grid grid-cols-1 mt-6 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-3 gap-6 animate-in fade-in slide-in-from-bottom-4 duration-500"
  >
    @if (loading() && !data().length) {
      @for (i of skeletonItems; track i) {
        <sga-skeleton [customClass]="'h-[220px] w-full rounded-4xl border border-base-200'" />
      }
    } @else {
      @for (competency of filteredData(); track competency.id) {
        <sga-competency-card
          [competency]="competency"
          (edit)="editCompetency(competency)"
          (delete)="deleteCompetency(competency)"
        />
      } @empty {
        <div class="col-span-full">
          <sga-empty-state
            iconClass="fas fa-bullseye"
            title="Sin competencias"
            description="Aún no hay competencias. Crea la primera y asígnala a un curso."
            actionLabel="Crear primera competencia"
            (action)="createFromEmpty()"
          />
        </div>
      }
    }
  </div>
</div>
