<div class="relative w-full">
  <div class="relative flex items-center w-full">
    @if (type() === 'email') {
      <i
        class="fas fa-envelope absolute left-2.5 top-1/2 -translate-y-1/2 text-base-content/40 text-xs pointer-events-none w-4"
      ></i>
    }
    @if (type() === 'password') {
      <i
        class="fas fa-lock absolute left-2.5 top-1/2 -translate-y-1/2 text-base-content/40 text-xs pointer-events-none w-4"
      ></i>
    }
    @if (type() === 'date') {
      <i
        class="fas fa-calendar absolute left-2.5 top-1/2 -translate-y-1/2 text-base-content/40 text-xs pointer-events-none w-4"
      ></i>
    }
    @if (type() === 'tel') {
      <i
        class="fas fa-phone absolute left-2.5 top-1/2 -translate-y-1/2 text-base-content/40 text-xs pointer-events-none w-4"
      ></i>
    }

    <!-- Input Element -->
    <input
      #inputElement
      z-input
      [id]="id()"
      [type]="type()"
      [placeholder]="placeholder()"
      [disabled]="disabled()"
      [min]="min()"
      [max]="max()"
      [value]="inputValue"
      (input)="onInput($event)"
      (blur)="onBlur()"
      [class]="
        'w-full font-medium transition-colors duration-200 ' +
        (hasIconPrefix() ? 'pl-8 ' : '') +
        customClass()
      "
    />

    <!-- Clear Button -->
    @if (localValue && !disabled()) {
      <button
        type="button"
        class="bg-background hover:bg-muted absolute right-2 flex h-6 w-6 items-center justify-center rounded-md text-foreground/40 transition-all duration-200 hover:text-foreground"
        (click)="clearInput()"
        tabindex="-1"
      >
        <i class="fas fa-xmark text-sm"></i>
      </button>
    }
  </div>

  <!-- Validation Error Text -->
  <small>
    @if (required() && !localValue && touched()) {
      <span class="text-destructive mt-1 block text-xs font-medium">* Este campo es requerido</span>
    }
  </small>
</div>
