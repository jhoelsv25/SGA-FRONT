<div class="space-y-6">
  @for (i of [1, 2, 3]; track i) {
    <div class="card-premium p-8 bg-white dark:bg-zinc-900 border-none">
      <div class="flex items-center gap-4 mb-6">
        <div class="w-14 h-14 rounded-2xl bg-base-200 animate-pulse"></div>
        <div class="space-y-2 flex-1">
          <div class="h-4 w-1/4 bg-base-200 animate-pulse rounded-full"></div>
          <div class="h-3 w-1/6 bg-base-200 animate-pulse rounded-full"></div>
        </div>
      </div>
      <div class="h-20 w-full bg-base-200/50 animate-pulse rounded-2xl"></div>
    </div>
  }
</div>
