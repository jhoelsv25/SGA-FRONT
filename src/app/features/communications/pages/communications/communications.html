<div class="p-6 max-w-7xl mx-auto">
  <sga-header-detail
    [config]="headerConfig()"
    [actions]="headerActions()"
    (action)="onHeaderAction($event)"
  />

  <section class="mb-6 grid grid-cols-1 gap-4 md:grid-cols-2 xl:grid-cols-4">
    @for (stat of stats(); track stat.label) {
      <article class="rounded-4xl border border-base-200 bg-card p-5">
        <p class="text-[10px] font-black uppercase tracking-[0.2em] text-primary/70">
          {{ stat.label }}
        </p>
        <p class="mt-3 text-3xl font-black tracking-tight">{{ stat.value }}</p>
        <p class="mt-1 text-sm text-base-content/55">{{ stat.helper }}</p>
      </article>
    }
  </section>

  @if (loading()) {
    <div class="grid grid-cols-1 gap-4">
      <z-skeleton [class]="'h-[220px] w-full rounded-4xl border border-base-200'"></z-skeleton>
      <z-skeleton [class]="'h-[220px] w-full rounded-4xl border border-base-200'"></z-skeleton>
    </div>
  } @else if (data().length) {
    <section class="grid grid-cols-1 gap-4">
      @for (communication of data(); track communication.id) {
        <sga-communication-card
          [communication]="communication"
          [readonlyMode]="mode() !== 'announcements'"
          (viewDetail)="viewDetail($event)"
          (edit)="editCommunication($event)"
          (delete)="deleteCommunication($event)"
        />
      }
    </section>
  } @else {
    <div
      class="rounded-[var(--radius-xl)] border border-dashed border-base-300 bg-background/60 p-8"
    >
      <z-empty
        zIcon="bell"
        [zTitle]="mode() === 'notifications' ? 'Sin notificaciones' : 'Sin comunicaciones'"
        [zDescription]="
          mode() === 'notifications'
            ? 'No hay notificaciones registradas todavía.'
            : 'No hay comunicaciones registradas todavía.'
        "
      ></z-empty>
    </div>
  }
</div>
