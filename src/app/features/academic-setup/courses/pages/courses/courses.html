<sga-header-detail
  [config]="headerConfig()"
  [actions]="headerActions()"
  (action)="onHeaderAction($event)"
  (refresh)="onRefresh()"
/>

<div class="p-6 space-y-4">
  <sga-list-toolbar
    [searchPlaceholder]="'Buscar cursos por nombre o código...'"
    [filterCount]="filterCount()"
    (searchChange)="onSearch($event)"
  >
    <div list-toolbar-filter class="space-y-3 p-1">
      <p class="text-sm font-semibold text-base-content">Filtrar por tipo</p>
      <select
        class="w-full px-3 py-2 rounded-xl border border-base-200 bg-base-100 text-sm"
        [value]="filterType()"
        (change)="onFilterType($event)"
      >
        <option value="">Todos</option>
        <option value="mandatory">Obligatorios</option>
        <option value="elective">Electivos</option>
      </select>
    </div>
  </sga-list-toolbar>

  <div
    class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-3 gap-6 animate-in fade-in slide-in-from-bottom-4 duration-500"
  >
    @if (loading() && !data().length) {
      @for (i of skeletonItems; track i) {
        <sga-skeleton [customClass]="'h-[220px] w-full rounded-4xl border border-base-200'" />
      }
    } @else {
      @for (course of filteredData(); track course.id) {
        <sga-course-card
          [course]="course"
          (edit)="editCourse(course)"
          (delete)="deleteCourse(course)"
        />
      } @empty {
        <div class="col-span-full">
          <sga-empty-state
            iconClass="fas fa-book"
            title="Sin cursos"
            description="Aún no hay cursos configurados. Crea el primero para asignar a áreas y niveles."
            actionLabel="Crear primer curso"
            (action)="createFromEmpty()"
          />
        </div>
      }
    }
  </div>
</div>
