<div class="space-y-6 p-6">
  <ng-template #filters>
    <div class="relative flex min-w-80 flex-col gap-5 rounded-xl bg-card p-5">
      <div class="flex items-center justify-between border-b border-base-200 pb-3">
        <h3 class="text-xs font-bold uppercase tracking-widest text-base-content/50">Filtros</h3>
        @if (hasActiveFilters()) {
        <button type="button"
          class="text-xs font-semibold uppercase tracking-widest text-primary transition hover:opacity-80"
          (click)="clearFilters()">
          Limpiar
        </button>
        }
      </div>

      <z-form-field>
        <label z-form-label>Buscar</label>
        <z-form-control>
          <input z-input [ngModel]="searchTerm()" placeholder="Buscar por nombre, correo, código o grado..."
            (ngModelChange)="onSearch($event)" />
        </z-form-control>
      </z-form-field>

      <z-form-field>
        <label z-form-label>Sección</label>
        <z-form-control>
          <sga-section-select [ngModel]="filterSectionId() || null" (ngModelChange)="onFilterSection($event)"
            placeholder="Todas las secciones"></sga-section-select>
        </z-form-control>
      </z-form-field>

      <z-form-field>
        <label z-form-label>Año académico</label>
        <z-form-control>
          <sga-year-academic-select [ngModel]="filterAcademicYearId() || null"
            (ngModelChange)="onFilterAcademicYear($event)" placeholder="Todos los años"></sga-year-academic-select>
        </z-form-control>
      </z-form-field>
    </div>
  </ng-template>

  <sga-header-detail [config]="headerConfig()" [actions]="headerActions()" [filterTemplate]="filters"
    [hasActiveFilters]="hasActiveFilters()" (action)="onHeaderAction($event)" (refresh)="onRefresh()" />

  <div class="grid grid-cols-1 gap-6 animate-in fade-in slide-in-from-bottom-4 duration-500">
    @if (loading() && !data().length) {
    @for (i of skeletonItems; track i) {
    <z-skeleton [class]="'h-55 w-full rounded-4xl border border-base-200'"></z-skeleton>
    }
    } @else {
    @for (student of filteredData(); track student.id) {
    <sga-student-card [student]="student" (viewDetail)="goToDetail($event)" (edit)="editStudent($event)"
      (delete)="deleteStudent($event)" (viewEnrollments)="goToEnrollments($event)"
      (viewAttendance)="goToAttendance($event)" (viewGuardians)="goToGuardians($event)"
      (viewObservations)="goToObservations($event)" />
    } @empty {
    <div class="col-span-full">
      <z-empty zIcon="graduation-cap" zTitle="Sin estudiantes"
        zDescription="Todavía no hay estudiantes registrados o no coinciden con los filtros aplicados.">
        @if (canManageStudents()) {
        <button z-button type="button" class="mt-4" (click)="createFromEmpty()">
          Crear estudiante
        </button>
        }
      </z-empty>
    </div>
    }
    }
  </div>
</div>
