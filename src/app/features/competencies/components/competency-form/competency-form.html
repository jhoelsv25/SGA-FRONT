<form [formGroup]="form" class="grid gap-4" (ngSubmit)="onSubmit()">
  <header class="flex items-center justify-between mb-4">
    <div>
      <h2 class="text-lg font-semibold text-neutral-800 dark:text-white mb-0">{{ title() }}</h2>
      <p class="text-sm text-neutral-500 dark:text-neutral-400 mt-1">
        {{ subTitle() }}
      </p>
    </div>
    <button
      type="button"
      z-button
      zColor="secondary"
      zType="ghost"
      zShape="circle"
      (click)="onClose()"
    >
      <i class="fas fa-times"></i>
    </button>
  </header>
  <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
    <div>
      <label class="label-form" for="code">Código</label>
      <input
        z-input
        w-full
        id="code"
        type="text"
        formControlName="code"
        placeholder="Código de competencia"
      />
    </div>
    <div>
      <label class="label-form" for="name">Nombre</label>
      <input
        z-input
        w-full
        id="name"
        type="text"
        formControlName="name"
        placeholder="Nombre de competencia"
      />
    </div>
    <div class="md:col-span-2">
      <label class="label-form" for="description">Descripción</label>
      <input
        z-input
        w-full
        id="description"
        type="text"
        formControlName="description"
        placeholder="Descripción"
      />
    </div>
    <div class="md:col-span-2">
      <label class="label-form" for="expectedAchievement">Nivel esperado</label>
      <input
        z-input
        w-full
        id="expectedAchievement"
        type="text"
        formControlName="expectedAchievement"
        placeholder="Nivel esperado"
      />
    </div>
    <div class="md:col-span-2">
      <label class="label-form" for="course">Curso</label>
      <sga-course-select
        id="course"
        formControlName="course"
        placeholder="Seleccionar curso"
      ></sga-course-select>
    </div>
  </div>
  <footer class="flex items-center justify-end gap-2 mt-6">
    <button type="button" z-button zColor="secondary" zType="outline" (click)="onClose()">
      <i class="fas fa-times"></i>
      Cancelar
    </button>
    <button type="submit" z-button zColor="primary" [disabled]="form.invalid || saving()">
      <i class="fas fa-check"></i>
      {{ saving() ? 'Guardando...' : 'Guardar' }}
    </button>
  </footer>
</form>
