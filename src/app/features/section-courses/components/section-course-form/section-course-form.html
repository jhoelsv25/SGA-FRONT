<form [formGroup]="form" class="grid gap-4" (ngSubmit)="onSubmit()">
  <header class="flex items-center justify-between mb-4">
    <h2 class="text-lg font-semibold">{{ title() }}</h2>
    <button
      type="button"
      z-button
      zColor="secondary"
      zType="ghost"
      zShape="circle"
      (click)="onClose()"
    >
      <i class="fas fa-times"></i>
    </button>
  </header>
  <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
    <div>
      <label class="label-form" for="section">Sección</label>
      <z-select-option
        id="section"
        formControlName="section"
        placeholder="Seleccionar sección"></z-select-option>
    </div>
    <div>
      <label class="label-form" for="course">Curso</label>
      <z-select-option id="course" formControlName="course" placeholder="Seleccionar curso"></z-select-option>
    </div>
    <div>
      <label class="label-form" for="academicYear">Año académico</label>
      <z-select-option id="academicYear" formControlName="academicYear" placeholder="Seleccionar año"></z-select-option>
    </div>
    <div>
      <label class="label-form" for="teacher">Docente</label>
      <z-select-option
        id="teacher"
        formControlName="teacher"
        placeholder="Seleccionar docente"></z-select-option>
    </div>
    <div>
      <label class="label-form" for="modality">Modalidad</label>
      <z-select-option
        id="modality"
        [options]="modalityOptions"
        formControlName="modality"
        [searchable]="false"></z-select-option>
    </div>
    <div>
      <label class="label-form" for="maxStudents">Máx. estudiantes</label>
      <input z-input w-full id="maxStudents" type="number" formControlName="maxStudents"  />
    </div>
    <div>
      <label class="label-form" for="enrolledStudents">Matriculados</label>
      <input z-input w-full id="enrolledStudents" type="number" formControlName="enrolledStudents"  />
    </div>
    <div class="md:col-span-2">
      <label class="label-form" for="status">Estado</label>
      <z-select-option
        id="status"
        [options]="statusOptions"
        formControlName="status"
        [searchable]="false"></z-select-option>
    </div>
  </div>
  <footer class="flex justify-end gap-2 mt-4">
    <button type="button" z-button zColor="secondary" zType="outline" (click)="onClose()">
      Cancelar
    </button>
    <button type="submit" z-button zColor="primary" [disabled]="form.invalid || saving()">
      {{ saving() ? 'Guardando...' : 'Guardar' }}
    </button>
  </footer>
</form>
