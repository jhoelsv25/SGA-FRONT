<sga-card
  class="group flex flex-col h-full transition-all duration-300 border border-base-200/80 overflow-hidden bg-base-100 rounded-4xl shadow-sm"
>
  <div class="flex flex-col space-y-1.5 p-6 pb-3 border-b border-base-200/50 bg-base-200/10">
    <div class="flex justify-between items-start">
      <div
        class="flex flex-col items-center justify-center w-14 h-14 rounded-2xl shadow-sm border"
        [ngClass]="getLevelColor(gradeLevel().level)"
      >
        <i class="fas fa-graduation-cap text-xl"></i>
      </div>
      <div
        class="flex gap-1 opacity-0 group-hover:opacity-100 transition-opacity"
        role="group"
        tabindex="0"
        (click)="$event.stopPropagation()"
        (keydown.enter)="$event.preventDefault(); $event.stopPropagation()"
        (keydown.space)="$event.preventDefault(); $event.stopPropagation()"
      >
        <button
          sgaButton
          variant="ghost"
          size="sm"
          class="rounded-lg h-8 w-8 p-0 hover:bg-base-200/60"
          (click)="edit.emit(gradeLevel()); $event.stopPropagation()"
          title="Editar"
        >
          <i class="fas fa-edit text-xs"></i>
        </button>
        <button
          sgaButton
          variant="ghost"
          size="sm"
          class="rounded-lg h-8 w-8 p-0 text-error hover:bg-error/10"
          (click)="delete.emit(gradeLevel()); $event.stopPropagation()"
          title="Eliminar"
        >
          <i class="fas fa-trash text-xs"></i>
        </button>
      </div>
    </div>
    <h2
      class="leading-none tracking-tight mt-4 text-xl font-bold text-base-content group-hover:text-primary transition-colors"
    >
      {{ gradeLevel().name }}
    </h2>
    <div class="flex items-center gap-2 mt-1">
      <span
        class="text-[10px] font-black uppercase tracking-widest px-2 py-0.5 rounded border"
        [ngClass]="getLevelColor(gradeLevel().level)"
      >
        {{ gradeLevel().gradeNumber }}° {{ getLevelLabel(gradeLevel().level) }}
      </span>
    </div>
  </div>

  <div class="p-6 pt-5 grow">
    <div class="space-y-4">
      <div
        class="flex items-center justify-between text-xs px-3 py-2.5 rounded-3xl bg-base-200/10 border border-base-200/30 hover:bg-base-200/20 transition-colors"
      >
        <div class="flex items-center gap-2 text-base-content/50">
          <i class="fas fa-users text-primary/50"></i>
          <span>Capacidad Máxima</span>
        </div>
        <span class="font-bold text-primary">{{ gradeLevel().maxCapacity }} Estudiantes</span>
      </div>

      @if (gradeLevel().description) {
        <p
          class="text-sm text-base-content/60 leading-relaxed px-3 py-2 rounded-2xl bg-base-200/10 border border-base-200/30"
        >
          {{ gradeLevel().description }}
        </p>
      }

      <button
        sgaButton
        variant="outline"
        size="sm"
        class="w-full mt-3 gap-2 rounded-3xl border-primary/30 text-primary hover:bg-primary/10 hover:border-primary/50 py-2.5 transition-all"
        (click)="viewSections.emit(gradeLevel()); $event.stopPropagation()"
      >
        <i class="fas fa-layer-group text-xs"></i>
        Ver secciones
      </button>
    </div>
  </div>
</sga-card>
