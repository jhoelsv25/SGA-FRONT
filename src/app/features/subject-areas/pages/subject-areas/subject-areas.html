<div class="space-y-6 p-6">
  <ng-template #filters>
    <div class="relative flex min-w-80 flex-col gap-5 rounded-xl bg-card p-5">
      <div class="flex items-center justify-between border-b border-base-200 pb-3">
        <h3 class="text-xs font-bold uppercase tracking-widest text-base-content/50">Filtros</h3>
        @if (hasActiveFilters()) {
        <button type="button"
          class="text-xs font-semibold uppercase tracking-widest text-primary transition hover:opacity-80"
          (click)="clearFilters()">
          Limpiar
        </button>
        }
      </div>

      <z-form-field>
        <label z-form-label>Buscar</label>
        <z-form-control>
          <input z-input placeholder="Buscar áreas por nombre o código..." [ngModel]="searchTerm()"
            (ngModelChange)="onSearch($event)" />
        </z-form-control>
      </z-form-field>

      <z-form-field>
        <label z-form-label>Tipo</label>
        <z-form-control>
          <z-select-option [options]="typeOptions" [ngModel]="filterType()" [placeholder]="'Todos'" [searchable]="false"
            (ngModelChange)="onFilterType($event)"></z-select-option>
        </z-form-control>
      </z-form-field>
    </div>
  </ng-template>

  <sga-header-detail [config]="headerConfig()" [actions]="headerActions()" [filterTemplate]="filters"
    [hasActiveFilters]="hasActiveFilters()" (action)="onHeaderAction($event)" (refresh)="onRefresh()" />

  <div class="grid grid-cols-1 gap-6 animate-in fade-in slide-in-from-bottom-4 duration-500">
    @if (loading() && !data().length) {
    @for (i of skeletonItems; track i) {
    <z-skeleton [class]="'h-[200px] w-full rounded-4xl border border-base-200'"></z-skeleton>
    }
    } @else {
    @for (group of groupedData(); track group.key) {
    <div class="grid grid-cols-1 gap-6">
      @for (area of group.items; track area.id) {
      <sga-subject-area-card [subjectArea]="area" (edit)="editSubjectArea(area)" (delete)="deleteSubjectArea(area)"
        (viewCourses)="goToCourses(area)" />
      }
    </div>
    } @empty {
    <div class="col-span-full">
      <z-empty zIcon="book-open" zTitle="Sin áreas curriculares"
        zDescription="Aún no hay áreas curriculares. Crea troncal, electiva u opcional para organizar las materias.">
        @if (canManageSubjectAreas()) {
        <button z-button type="button" class="mt-4" (click)="createFromEmpty()">
          Crear área
        </button>
        }
      </z-empty>
    </div>
    }
    }
  </div>
</div>
