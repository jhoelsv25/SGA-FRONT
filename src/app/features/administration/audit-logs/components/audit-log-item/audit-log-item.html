 <button 
      type="button"
      (click)="expanded.set(!expanded())"
      (keydown.enter)="expanded.set(!expanded())"
      (keydown.space)="expanded.set(!expanded()); $event.preventDefault()"
      [class.bg-base-200]="expanded()"
      class="group flex flex-col border-b border-base-200/60 transition-all duration-500 cursor-pointer overflow-hidden w-full text-left">
      
      <!-- HEADER PART (Always visible) -->
      <div class="flex items-center gap-6 p-5 hover:bg-base-200/30 transition-colors">
        <div class="flex items-center gap-4 shrink-0">
          @if (log().user?.avatar) {
            <img [src]="log().user?.avatar" class="w-12 h-12 rounded-2xl object-cover shadow-sm group-hover:ring-2 group-hover:ring-primary/30 transition-all duration-500" [alt]="log().user?.name">
          } @else {
            <div [class]="'w-12 h-12 rounded-2xl flex items-center justify-center text-xl transition-all duration-500 shadow-sm ' + getActionClass()">
              <i [class]="getActionIcon()"></i>
            </div>
          }
        </div>

        <!-- Log Content -->
        <div class="flex-1 min-w-0">
          <div class="flex items-center gap-3 mb-1">
            <span [class]="'px-2 py-0.5 rounded-lg text-[9px] font-black uppercase tracking-widest border ' + getEntityClass()">
              {{ log().entity }}
            </span>
            <span class="text-[10px] font-black text-base-content/20 uppercase tracking-widest">•</span>
            <span class="text-xs font-bold text-base-content/40">{{ log().createdAt | date:'HH:mm:ss' }}</span>
          </div>
          
          <h4 class="text-[13px] font-bold text-base-content leading-tight group-hover:text-primary transition-colors">
            {{ log().description }}
          </h4>
          
          <div class="flex items-center gap-2 mt-2 opacity-40 group-hover:opacity-100 transition-opacity">
            <i class="fas fa-fingerprint text-[10px]"></i>
            <span class="text-[9px] font-mono truncate max-w-[300px] tracking-tighter">{{ log().entityId }}</span>
          </div>
        </div>

        <div class="text-right hidden sm:block">
          <p class="text-[11px] font-black text-base-content/80">{{ log().createdAt | date:'dd MMM, yyyy' }}</p>
          <div class="flex items-center justify-end gap-1.5 mt-1">
            <span class="text-[8px] font-black text-base-content/20 uppercase tracking-tighter">Responsable:</span>
            <div class="flex items-center gap-1">
              <i class="fas fa-user-shield text-[10px] text-primary/40"></i>
              <span [class]="'text-[10px] font-bold truncate max-w-[120px] ' + (log().user?.id ? 'text-primary' : 'text-base-content/40')">
                {{ log().user?.name || 'Sistema' }}
              </span>
            </div>
          </div>
        </div>

        <!-- Expand Icon -->
        <div class="ml-2 text-base-content/20 transition-transform duration-500" [class.rotate-180]="expanded()">
          <i class="fas fa-chevron-down"></i>
        </div>
      </div>

      <!-- COLLAPSIBLE CONTENT (Changes) -->
      @if (expanded()) {
        <div class="px-5 pb-6 pt-2 animate-in slide-in-from-top-2 duration-500">
          <div class="bg-base-300/30 rounded-3xl p-6 border border-base-300 overflow-x-auto">
            <div class="flex flex-col gap-6">
              
              <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <!-- BEFORE -->
                <div class="space-y-3">
                  <div class="flex items-center gap-2 px-3 py-1 bg-error/10 text-error rounded-full w-fit">
                    <i class="fas fa-history text-[10px]"></i>
                    <span class="text-[9px] font-black uppercase tracking-widest">Estado Anterior</span>
                  </div>
                  @if (log().before) {
                    <pre class="text-[11px] font-mono leading-relaxed bg-base-100/50 p-4 rounded-2xl border border-base-200 max-h-60 overflow-y-auto">{{ log().before | json }}</pre>
                  } @else {
                    <div class="p-4 bg-base-100/30 rounded-2xl border border-dashed border-base-300 text-center">
                      <span class="text-[10px] font-bold text-base-content/30 italic">Sin registros previos</span>
                    </div>
                  }
                </div>

                <!-- AFTER -->
                <div class="space-y-3">
                  <div class="flex items-center gap-2 px-3 py-1 bg-success/10 text-success rounded-full w-fit">
                    <i class="fas fa-circle-check text-[10px]"></i>
                    <span class="text-[9px] font-black uppercase tracking-widest">Estado Nuevo</span>
                  </div>
                  @if (log().after) {
                    <pre class="text-[11px] font-mono leading-relaxed bg-base-100/50 p-4 rounded-2xl border border-base-200 max-h-60 overflow-y-auto">{{ log().after | json }}</pre>
                  } @else {
                    <div class="p-4 bg-base-100/30 rounded-2xl border border-dashed border-base-300 text-center">
                      <span class="text-[10px] font-bold text-base-content/30 italic">Sin registros posteriores (Eliminado)</span>
                    </div>
                  }
                </div>
              </div>

              <!-- DETAILED COMPARISON (If update) -->
              @if (log().action === 'UPDATE' && log().before && log().after) {
                <div class="pt-6 border-t border-base-300">
                  <div class="flex items-center gap-3 mb-6">
                    <div class="w-8 h-8 rounded-xl bg-primary/10 text-primary flex items-center justify-center">
                      <i class="fas fa-magnifying-glass-chart text-xs"></i>
                    </div>
                    <h5 class="text-[11px] font-black text-base-content uppercase tracking-widest">Resumen de Atributos Modificados</h5>
                  </div>
                  
                  <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4">
                    @for (change of getChanges(); track change.field) {
                      <div class="group/item p-4 bg-base-100 rounded-2xl border border-base-200 hover:border-primary/30 hover:shadow-lg hover:shadow-primary/5 transition-all duration-300">
                        <div class="flex items-center justify-between mb-3">
                          <span class="text-[10px] font-black text-primary/60 uppercase tracking-tighter">{{ change.field }}</span>
                          <span class="px-2 py-0.5 bg-primary/5 text-primary text-[8px] font-black rounded-lg">MODIFICADO</span>
                        </div>
                        
                        <div class="space-y-2">
                           <div class="flex items-center gap-2 p-2 bg-error/5 rounded-xl border border-error/10">
                              <i class="fas fa-minus-circle text-[8px] text-error"></i>
                              <span class="text-[10px] text-error/70 font-medium truncate">{{ change.old }}</span>
                           </div>
                           <div class="flex items-center gap-2 p-2 bg-success/5 rounded-xl border border-success/10">
                              <i class="fas fa-plus-circle text-[8px] text-success"></i>
                              <span class="text-[10px] text-success font-bold truncate">{{ change.new }}</span>
                           </div>
                        </div>
                      </div>
                    }
                  </div>
                </div>
              }
            </div>
          </div>
        </div>
      }
    </button>
