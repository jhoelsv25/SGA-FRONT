<sga-card 
  class="role-card group transition-all duration-300 hover:shadow-2xl hover:-translate-y-2 border-base-200 rounded-4xl overflow-hidden relative" 
  [class.selected]="selected"
  (click)="roleSelected.emit(role)"
>
  <!-- Active/System Indicator Top Corner -->
  <div class="absolute top-4 right-4 flex gap-1.5 z-10">
    @if (role.isSystem) {
      <div 
        class="w-7 h-7 rounded-full bg-secondary/10 text-secondary flex items-center justify-center border border-secondary/20 shadow-sm"
        title="Rol de Sistema"
      >
        <i class="fas fa-lock text-[10px]"></i>
      </div>
    }
    <div 
      class="w-7 h-7 rounded-full flex items-center justify-center border shadow-sm transition-all"
      [class.bg-success/10]="role.isActive"
      [class.text-success]="role.isActive"
      [class.border-success/20]="role.isActive"
      [class.bg-base-200]="!role.isActive"
      [class.text-base-content/30]="!role.isActive"
      [title]="role.isActive ? 'Activo' : 'Inactivo'"
    >
      <i class="fas fa-circle text-[7px]"></i>
    </div>
  </div>

  <div class="flex flex-col space-y-1.5 p-6 pt-8 pb-3">
    <div class="flex items-center gap-3">
      <div class="w-12 h-12 rounded-2xl bg-primary/10 text-primary flex items-center justify-center text-xl shadow-sm group-hover:bg-primary group-hover:text-primary-content transition-all duration-500">
        <i class="fas fa-shield-halved"></i>
      </div>
      <div class="min-w-0">
        <h2 class="text-2xl font-semibold leading-none tracking-tight text-lg font-bold text-base-content group-hover:text-primary transition-colors truncate">
          {{role.name}}
        </h2>
        <p class="text-[10px] text-base-content/40 font-medium uppercase tracking-widest mt-0.5">Rol de Usuario</p>
      </div>
    </div>
  </div>
  
  <div class="p-6 pt-0 pb-5">
    <p class="text-sm text-base-content/60 leading-relaxed line-clamp-2 min-h-[40px] mb-5">
      {{role.description || 'Sin descripción detallada para este perfil de acceso.'}}
    </p>
    
    <!-- Stats Row -->
    <div class="grid grid-cols-2 gap-2">
      <div class="p-2.5 rounded-2xl bg-base-100 border border-base-200 flex items-center gap-2.5 group-hover:border-primary/20 transition-colors">
        <div class="w-7 h-7 rounded-lg bg-info/10 text-info flex items-center justify-center">
           <i class="fas fa-users text-[10px]"></i>
        </div>
        <div class="min-w-0">
          <p class="text-sm font-bold text-base-content leading-tight">{{ role.userCount || 0 }}</p>
          <p class="text-[9px] text-base-content/40 font-medium uppercase truncate">Usuarios</p>
        </div>
      </div>

      <div class="p-2.5 rounded-2xl bg-base-100 border border-base-200 flex items-center gap-2.5 group-hover:border-primary/20 transition-colors">
        <div class="w-7 h-7 rounded-lg bg-warning/10 text-warning flex items-center justify-center">
           <i class="fas fa-key text-[10px]"></i>
        </div>
        <div class="min-w-0">
          <p class="text-sm font-bold text-base-content leading-tight">{{ role.permissionsCount || 0 }}</p>
          <p class="text-[9px] text-base-content/40 font-medium uppercase truncate">Permisos</p>
        </div>
      </div>
    </div>
  </div>

  <div class="flex items-center p-6 pt-0 border-t border-base-200/50 pt-3 justify-between">
    <div class="flex items-center gap-1.5">
      <div class="w-5 h-5 rounded bg-base-200 flex items-center justify-center">
         <i class="fas fa-fingerprint text-[9px] text-base-content/30"></i>
      </div>
      <span class="text-[9px] font-mono text-base-content/30">{{role.id.split('-')[0]}}</span>
    </div>
    
    <div class="flex gap-1 translate-y-1 group-hover:translate-y-0 opacity-0 group-hover:opacity-100 transition-all duration-300">
      <button sgaButton variant="ghost" size="sm" class="rounded-xl h-8 w-8 p-0 hover:bg-primary/10 hover:text-primary" 
              (click)="$event.stopPropagation(); editClicked.emit(role)"
              title="Configurar">
        <i class="fas fa-sliders text-xs"></i>
      </button>
      
      @if (!role.isSystem) {
        <button sgaButton variant="ghost" size="sm" class="rounded-xl h-8 w-8 p-0 text-error hover:bg-error/10" 
                (click)="$event.stopPropagation(); deleteClicked.emit(role)"
                title="Eliminar">
          <i class="fas fa-trash-can text-xs"></i>
        </button>
      }
    </div>
  </div>
</sga-card>
