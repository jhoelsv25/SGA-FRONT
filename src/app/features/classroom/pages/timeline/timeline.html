<div class="space-y-10 animate-in fade-in slide-in-from-bottom-8 duration-1000 pb-20">
  
  <sga-classroom-timeline-stats />

  <sga-classroom-timeline-publisher />

  <!-- Feed Area -->
  <div class="space-y-8">
    @if (store.loading()) {
      <sga-classroom-timeline-skeleton />
    } @else {
    @for (item of store.feed(); track item.id; let i = $index) {
      <sga-classroom-timeline-feed-item [item]="item" [style.animation-delay]="i * 100 + 'ms'" />
    } @empty {
    <div class="py-32 flex flex-col items-center justify-center text-center">
      <div
        class="w-24 h-24 bg-base-200/50 rounded-3xl flex items-center justify-center text-base-content/10 mb-8 animate-bounce">
        <i class="fa-solid fa-cloud-sun text-4xl"></i>
      </div>
      <h3 class="text-2xl font-black text-base-content/60 tracking-tight">Todo despejado por hoy</h3>
      <p class="text-base-content/40 font-medium max-w-xs mt-2">No hay publicaciones recientes en esta sección del aula.
      </p>
    </div>
    }
    }
  </div>
</div>
