<form [formGroup]="form" class="grid gap-4" (ngSubmit)="submit()">
  <header class="flex items-center justify-between mb-4">
    <h2 class="text-lg font-semibold">{{ current ? 'Editar usuario' : 'Nuevo usuario' }}</h2>
    <button type="button" z-button zColor="secondary" zType="ghost" zShape="circle" (click)="close()"
      class="h-8 w-8 !p-0">
      <z-icon zType="x" class="h-4 w-4" />
    </button>
  </header>
  <div class="grid gap-4">
    <z-form-field>
      <label z-form-label for="username" [zRequired]="true">Usuario</label>
      <z-form-control>
        <input z-input w-full id="username" formControlName="username" placeholder="Nombre de usuario" />
      </z-form-control>
    </z-form-field>

    <div class="grid grid-cols-2 gap-4">
      <z-form-field>
        <label z-form-label for="firstName" [zRequired]="true">Nombre</label>
        <z-form-control>
          <input z-input w-full id="firstName" formControlName="firstName" placeholder="Nombre" />
        </z-form-control>
      </z-form-field>

      <z-form-field>
        <label z-form-label for="lastName" [zRequired]="true">Apellido</label>
        <z-form-control>
          <input z-input w-full id="lastName" formControlName="lastName" placeholder="Apellido" />
        </z-form-control>
      </z-form-field>
      <div class="col-span-1">
        <label class="label-form" for="gender">Género</label>
        <select z-input w-full id="gender" formControlName="gender">
          <option value="M">Masculino</option>
          <option value="F">Femenino</option>
          <option value="O">Otro</option>
        </select>
      </div>
      <div class="col-span-1">
        <label class="label-form" for="birthDate">Fec. Nacimiento</label>
        <input z-input w-full id="birthDate" type="date" formControlName="birthDate" />
      </div>
      <div class="col-span-1">
        <label class="label-form" for="phone">Teléfono</label>
        <input z-input w-full id="phone" formControlName="phone" placeholder="987..." />
      </div>
      <div class="col-span-1">
        <label class="label-form" for="mobile">Celular</label>
        <input z-input w-full id="mobile" formControlName="mobile" placeholder="987..." />
      </div>
      <div class="col-span-full">
        <label class="label-form" for="address">Dirección</label>
        <input z-input w-full id="address" formControlName="address" placeholder="Av. Siempre Viva 123" />
      </div>

      <div class="col-span-full">
        <label class="label-form" for="email">Correo electrónico (Opcional)</label>
        <input z-input w-full id="email" type="email" formControlName="email" placeholder="ejemplo@correo.com" />
      </div>
      @if (!current) {
        <div class="col-span-full">
          <label class="label-form" for="password">Contraseña (Opcional)</label>
          <input z-input w-full id="password" type="password" formControlName="password" placeholder="******" />
          <p class="mt-1 text-[10px] text-base-content/40 italic">Por defecto: Si el usuario se vincula a una persona, se usará el DNI de esta.</p>
        </div>
      }
    </div>
  </div>
  <footer class="flex justify-end gap-2 mt-4">
    <button type="button" z-button zColor="secondary" zType="outline" (click)="close()" class="gap-2">
      <z-icon zType="ban" class="h-4 w-4" />
      Cancelar
    </button>
    <button type="submit" z-button zColor="primary" [disabled]="form.invalid" class="gap-2">
      <z-icon zType="save" class="h-4 w-4" />
      {{ current ? 'Actualizar' : 'Crear Usuario' }}
    </button>
  </footer>
</form>
