<form [formGroup]="form" class="grid gap-4" (ngSubmit)="submit()">
  <header class="flex items-center justify-between mb-4">
    <h2 class="text-lg font-semibold">{{ current ? 'Editar comunicación' : 'Nueva comunicación' }}</h2>
    <button type="button" z-button zColor="secondary" zType="ghost" zShape="circle" (click)="close()">
      <i class="fas fa-times"></i>
    </button>
  </header>
  <div class="grid gap-4">
    <div>
      <label class="label-form" for="subject">Asunto</label>
      <input z-input w-full id="subject" formControlName="subject" placeholder="Asunto de la comunicación"  />
    </div>
    <div>
      <label class="label-form" for="type">Tipo</label>
      <z-select-option id="type" formControlName="type" [options]="typeOptions" placeholder="Tipo de comunicación"></z-select-option>
    </div>
    <div>
      <label class="label-form" for="body">Mensaje</label>
      <input z-input w-full id="body" formControlName="body" placeholder="Contenido del mensaje"  />
    </div>
    <div>
      <label class="label-form" for="scheduledAt">Programar envío</label>
      <input z-input w-full id="scheduledAt" type="date" formControlName="scheduledAt" placeholder="Fecha de envío (opcional)"  />
    </div>
  </div>
  <footer class="flex justify-end gap-2 mt-4">
    <button type="button" z-button zColor="secondary" zType="outline" (click)="close()">Cancelar</button>
    <button type="submit" z-button zColor="primary" [disabled]="form.invalid">Guardar</button>
  </footer>
</form>
