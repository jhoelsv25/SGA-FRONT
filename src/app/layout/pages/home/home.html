<section
  id="admin"
  class="flex h-screen w-full overflow-hidden bg-base-50 dark:bg-base-900 text-base-content"
>
  <!-- Sidebar Container -->
  <aside
    class="flex-shrink-0 z-50 h-full border-r border-base-200 dark:border-base-800 bg-base-100 dark:bg-base-950 transition-all duration-300"
    [class.hidden]="isMobile() && !isMobileOpen()"
  >
    <sga-sidebar />
  </aside>

  <!-- Main Content Area -->
  <main class="flex-1 flex flex-col min-w-0 overflow-hidden relative">
    <sga-header />

    <div class="flex-1 overflow-y-auto p-4 md:p-6 lg:p-8 relative">
      <router-outlet />
    </div>
  </main>

  <!-- Right Activity Center (sga-aside) -->
  <sga-aside />

  <!-- Mobile Overlay Backdrop (Left Sidebar) -->
  @if (isMobileOpen()) {
    <div
      class="fixed inset-0 bg-black/40 backdrop-blur-sm z-40 transition-opacity duration-300 md:hidden"
      (click)="closeMobileSidebar()"
      (keydown.enter)="closeMobileSidebar()"
      tabindex="-1"
      aria-hidden="true"
    ></div>
  }
</section>
