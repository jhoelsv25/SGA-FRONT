<div class="p-6 space-y-6">
  <z-list-toolbar
    zTitle="Cursos"
    icon="fas fa-book"
    zDescription="Gestionar cursos"
    [searchPlaceholder]="'Buscar cursos por nombre o código...'"
    [filterCount]="filterCount()"
    (searchChange)="onSearch($event)"
    (refresh)="onRefresh()"
  >
    <div list-toolbar-actions class="flex items-center gap-2">
      <z-dropdown [items]="actionDropdownItems()">
        <button
          dropdown-trigger
          class="flex items-center justify-center w-10 h-10 rounded-2xl border border-base-200 bg-base-100 hover:bg-base-200 transition-colors text-base-content/60 hover:text-primary"
          aria-label="Más acciones"
          type="button"
        >
          <i class="fas fa-ellipsis-h"></i>
        </button>
      </z-dropdown>
    
    </div>
    <div list-toolbar-filter class="space-y-3 p-1">
      <p class="text-sm font-semibold text-base-content">Filtrar por tipo</p>
      <z-select-option
        [options]="typeOptions"
        [value]="filterType() || null"
        [placeholder]="'Todos'"
        
        [searchable]="false"
        (valueChange)="onFilterType($event)"></z-select-option>
    </div>
  </z-list-toolbar>

  <div
    class="grid grid-cols-1 mt-6 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-3 gap-6 animate-in fade-in slide-in-from-bottom-4 duration-500"
  >
    @if (loading() && !data().length) {
      @for (i of skeletonItems; track i) {
        <z-skeleton [class]="'h-[220px] w-full rounded-4xl border border-base-200'"></z-skeleton>
      }
    } @else {
      @for (course of filteredData(); track course.id) {
        <sga-course-card
          [course]="course"
          (edit)="editCourse(course)"
          (delete)="deleteCourse(course)"
         />
      } @empty {
        <div class="col-span-full">
          <z-empty zIcon="book" zTitle="Sin cursos" zDescription="Aún no hay cursos configurados. Crea el primero para asignar a áreas y niveles.">
    </z-empty>
        </div>
      }
    }
  </div>
</div>
