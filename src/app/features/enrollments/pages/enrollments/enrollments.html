<div class="p-6 max-w-7xl mx-auto">
  <ng-template #filters>
    <div class="p-5 flex flex-col gap-4 min-w-80 bg-white dark:bg-neutral-900 rounded-2xl relative">
      <div class="flex items-center justify-between pb-2 border-b border-base-200">
        <h3 class="text-xs font-bold text-base-content/50 uppercase tracking-widest">Filtros Activos</h3>
        @if (filterSearch() || filterStatus()) {
          <button type="button" class="text-xs text-primary font-medium hover:underline" (click)="clearFilters()">Limpiar</button>
        }
      </div>

      <z-form-field>
        <label z-form-label>Buscar</label>
        <z-form-control>
          <input z-input placeholder="Nombre Estudiante / Codigo..." [ngModel]="filterSearch()" (ngModelChange)="filterSearch.set($event)" />
        </z-form-control>
      </z-form-field>

      <z-form-field>
        <label z-form-label>Estado de Matrícula</label>
        <z-form-control>
          <z-select-option
            [options]="statuses"
            [ngModel]="filterStatus()"
            (ngModelChange)="filterStatus.set($event)"
            placeholder="Todos"
          ></z-select-option>
        </z-form-control>
      </z-form-field>

      <button type="button" z-button class="w-full mt-2" (click)="applyFilters()">
        Aplicar Filtros
      </button>
    </div>
  </ng-template>

  <sga-header-detail
    [config]="headerConfig()"
    [actions]="headerActions()"
    (action)="onHeaderAction($event)"
    [filterTemplate]="filters"
    [hasActiveFilters]="hasActiveFilters()"
   />
  @if (studentContextId()) {
    <div class="mb-6 rounded-4xl border border-primary/15 bg-primary/8 px-5 py-4 text-sm text-primary dark:bg-primary/10">
      <div class="flex flex-wrap items-center justify-between gap-3">
        <div class="space-y-1">
          <p class="text-[10px] font-black uppercase tracking-[0.24em] text-primary/70">Contexto de estudiante</p>
          <p class="font-semibold">
            Mostrando matrículas de
            <span class="font-black">{{ studentContextName() || 'estudiante seleccionado' }}</span>
          </p>
        </div>
        <button
          z-button
          zType="outline"
          type="button"
          class="h-9 rounded-[var(--radius-xl)] px-4 text-[10px] font-black uppercase tracking-[0.18em]"
          (click)="clearStudentContext()"
        >
          Ver todas
        </button>
      </div>
    </div>
  }
  <sga-data-source
    [data]="data()"
    [columns]="columns()"
    [loading]="loading()"
    [pagination]="pagination()"
    [actions]="rowActions()"
    (actionClick)="onRowAction($event)"
    (pageChange)="onPageChange($event)"
   />
</div>
