<sga-header-detail [config]="headerConfig" />

<div class="rounded-2xl border border-base-200 bg-base-100 p-4 md:p-5 shadow-sm">
  <div class="mb-4 flex flex-wrap items-end gap-3">
    <div>
      <label for="teacher-attendance-date" class="mb-1 block text-sm font-medium text-base-content/70">Fecha</label>
      <sga-input
        id="teacher-attendance-date"
        type="date"
        [ngModel]="attendanceDate()"
        (ngModelChange)="onDateChange($event)"
      />
    </div>

    <button type="button" sgaButton color="primary" variant="outline" (click)="openManualDialog()">
      <z-icon zType="plus" class="h-4 w-4 mr-2" />
      Registro manual
    </button>

    <button type="button" sgaButton color="primary" variant="outline" (click)="openImportDialog()">
      <z-icon zType="file-text" class="h-4 w-4 mr-2" />
      Importar Excel
    </button>

    <button type="button" sgaButton color="primary" variant="outline" (click)="downloadTemplate()">
      <z-icon zType="arrow-down" class="h-4 w-4 mr-2" />
      Plantilla Excel
    </button>

    <button type="button" sgaButton color="secondary" variant="outline" (click)="loadTeachers()">
      <z-icon zType="loader-circle" class="h-4 w-4 mr-2" />
      Recargar
    </button>

    <button type="button" sgaButton color="primary" variant="outline" (click)="syncBiometricNow()">
      <z-icon zType="activity" class="h-4 w-4 mr-2" />
      {{ syncingBiometric() ? 'Sincronizando...' : 'Sincronizar biométrico' }}
    </button>

    <div class="ml-auto flex items-center gap-2">
      <button
        type="button"
        sgaButton
        color="success"
        variant="outline"
        size="sm"
        [disabled]="saving() || loading()"
        (click)="saveManual()"
        class="!h-9"
        aria-label="Guardar asistencia manual"
      >
        @if (saving()) {
          <z-icon zType="loader-circle" class="h-4 w-4 mr-2 animate-spin" />
        } @else {
          <z-icon zType="save" class="h-4 w-4" />
        }
      </button>

      <button
        type="button"
        sgaButton
        color="danger"
        variant="outline"
        [disabled]="deleting() || loading() || !bulkDeleteMode() || !hasDeleteSelections()"
        (click)="deleteSelected()"
        aria-label="Eliminar seleccionados"
        class="!h-10 !w-10 !px-0 flex items-center justify-center"
      >
        @if (deleting()) {
          <z-icon zType="loader-circle" class="h-4 w-4 mr-2 animate-spin" />
        } @else {
          <z-icon zType="trash" class="h-4 w-4" />
        }
      </button>
    </div>
  </div>

  <div class="overflow-x-auto rounded-xl border border-base-200">
    <table class="w-full min-w-[860px] border-collapse bg-base-100">
      <thead>
        <tr class="border-b border-base-200 bg-base-200/50">
          <th class="w-12 px-3 py-2 text-center text-xs font-semibold uppercase tracking-wide text-base-content/60">
            <div class="flex items-center justify-center">
              <label class="inline-flex items-center cursor-pointer group">
                <input
                  type="checkbox"
                  class="sr-only"
                  [checked]="allSelected()"
                  [indeterminate]="partialSelected()"
                  (change)="toggleAllSelection()"
                />
                <div
                  class="w-5 h-5 border-2 rounded flex items-center justify-center transition-all"
                  [class.bg-primary-500]="allSelected() || partialSelected()"
                  [class.border-primary-500]="allSelected() || partialSelected()"
                  [class.border-base-400]="!allSelected() && !partialSelected()"
                >
                  @if (allSelected()) {
                    <i class="fas fa-check text-white text-xs"></i>
                  } @else if (partialSelected()) {
                    <i class="fas fa-minus text-white text-xs"></i>
                  }
                </div>
              </label>
            </div>
          </th>
          <th class="px-3 py-2 text-left text-xs font-semibold uppercase tracking-wide text-base-content/60">Codigo</th>
          <th class="px-3 py-2 text-left text-xs font-semibold uppercase tracking-wide text-base-content/60">Docente</th>
          <th class="px-3 py-2 text-left text-xs font-semibold uppercase tracking-wide text-base-content/60">Estado</th>
          <th class="px-3 py-2 text-left text-xs font-semibold uppercase tracking-wide text-base-content/60">Hora entrada</th>
          <th class="px-3 py-2 text-left text-xs font-semibold uppercase tracking-wide text-base-content/60">Observaciones</th>
          <th class="w-12 px-3 py-2 text-center text-xs font-semibold uppercase tracking-wide text-base-content/60">
            Acciones
          </th>
        </tr>
      </thead>
      <tbody>
        @if (loading()) {
          <tr>
            <td colspan="7" class="px-3 py-8 text-center text-sm text-base-content/50">
              Cargando docentes...
            </td>
          </tr>
        } @else if (rows().length === 0) {
          <tr>
            <td colspan="7" class="px-3 py-8 text-center text-sm text-base-content/50">
              No hay docentes disponibles para registrar asistencia.
            </td>
          </tr>
        } @else {
          @for (row of rows(); track row.teacherId) {
            <tr
              class="border-b border-base-200/70 align-top"
              [class.bg-warning/10]="row.dirty"
              [class.bg-error/10]="row.markedForDelete"
            >
              <td class="w-12 px-3 py-2 text-center align-middle">
                <label
                  class="inline-flex items-center justify-center w-full group"
                  [class.opacity-50]="isRowDeleteDisabled(row.teacherId)"
                >
                  <input
                    type="checkbox"
                    class="sr-only"
                    [checked]="row.markedForDelete"
                    (change)="toggleDelete(row.attendanceId, $event.target.checked)"
                  />
                  <div
                    class="w-5 h-5 border-2 rounded flex items-center justify-center transition-all"
                    [class.bg-primary-500]="row.markedForDelete"
                    [class.border-primary-500]="row.markedForDelete"
                    [class.border-base-400]="!row.markedForDelete"
                  >
                    @if (row.markedForDelete) {
                      <i class="fas fa-check text-white text-xs"></i>
                    }
                  </div>
                </label>
              </td>
              <td class="px-3 py-2 text-sm font-semibold text-base-content">{{ row.teacherCode }}</td>
              <td class="px-3 py-2 text-sm text-base-content/80">{{ row.teacherLabel }}</td>
              <td class="px-3 py-2">
                <div class="flex gap-2">
                  <button
                    type="button"
                    class="rounded px-2 py-1 text-xs font-semibold transition-colors"
                    [class]="row.status === 'present' ? 'bg-success text-success-content' : 'bg-success/10 text-success hover:bg-success/20'"
                    [disabled]="isRowSyncing(row.teacherId)"
                    (click)="setStatus(row.teacherId, 'present')"
                  >P</button>
                  <button
                    type="button"
                    class="rounded px-2 py-1 text-xs font-semibold transition-colors"
                    [class]="row.status === 'late' ? 'bg-warning text-warning-content' : 'bg-warning/10 text-warning hover:bg-warning/20'"
                    [disabled]="isRowSyncing(row.teacherId)"
                    (click)="setStatus(row.teacherId, 'late')"
                  >T</button>
                  <button
                    type="button"
                    class="rounded px-2 py-1 text-xs font-semibold transition-colors"
                    [class]="row.status === 'absent' ? 'bg-error text-error-content' : 'bg-error/10 text-error hover:bg-error/20'"
                    [disabled]="isRowSyncing(row.teacherId)"
                    (click)="setStatus(row.teacherId, 'absent')"
                  >F</button>
                  <button
                    type="button"
                    class="rounded px-2 py-1 text-xs font-semibold transition-colors"
                    [class]="row.status === 'excused' ? 'bg-info text-info-content' : 'bg-info/10 text-info hover:bg-info/20'"
                    [disabled]="isRowSyncing(row.teacherId)"
                    (click)="setStatus(row.teacherId, 'excused')"
                  >J</button>
                </div>
              </td>
              <td class="px-3 py-2">
                <sga-input
                  type="time"
                  [ngModel]="row.checkInTime.slice(0, 5)"
                  (ngModelChange)="updateCheckInTime(row.teacherId, $event)"
                />
              </td>
              <td class="px-3 py-2">
                <sga-input
                  [ngModel]="row.observations"
                  (ngModelChange)="updateObservations(row.teacherId, $event)"
                  placeholder="Observaciones"
                />
              </td>
              <td class="w-12 px-3 py-2 text-center align-middle">
                <button
                  type="button"
                  sgaButton
                  color="danger"
                  variant="ghost"
                  size="sm"
                  class="!h-9 !w-9 !px-0 flex items-center justify-center"
                  [disabled]="isRowDeleteDisabled(row.teacherId)"
                  (click)="deleteRow(row.teacherId)"
                  aria-label="Eliminar asistencia"
                >
                  <i class="fas fa-trash"></i>
                </button>
              </td>
            </tr>
          }
        }
      </tbody>
    </table>
  </div>
</div>
