<div class="col-span-full w-full flex flex-col items-center justify-center py-24 px-6 animate-in fade-in zoom-in-95 duration-500">

  <!-- Icono con glow -->
  <div class="relative mb-8">
    <div class="absolute inset-0 rounded-full bg-primary/10 blur-2xl scale-150 animate-pulse pointer-events-none"></div>
    <div class="relative w-28 h-28 rounded-3xl bg-gradient-to-br from-primary/20 to-primary/5 border border-primary/20 flex items-center justify-center shadow-xl">
      <i class="{{ iconClass() }} text-5xl text-primary/60"></i>
    </div>
  </div>

  <!-- Texto -->
  <h3 class="text-xl font-bold text-base-content mb-2 text-center">
    {{ title() }}
  </h3>
  <p class="text-base-content/50 text-sm text-center max-w-sm leading-relaxed mb-8">
    {{ description() }}
  </p>

  <!-- CTA (solo si hay actionLabel) -->
  @if (actionLabel()) {
    <button
    sgaButton
      class="btn btn-primary btn-md gap-2 shadow-lg shadow-primary/20 hover:shadow-primary/30 hover:-translate-y-0.5 transition-all duration-200"
      (click)="action.emit()"
    >
      <i class="fas fa-plus w-4 h-4"></i>
      {{ actionLabel() }}
    </button>
  }

</div>
