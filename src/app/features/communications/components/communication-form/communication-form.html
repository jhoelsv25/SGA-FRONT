<form [formGroup]="form" class="grid gap-4" (ngSubmit)="submit()">
  <header class="flex items-center justify-between mb-4">
    <h2 class="text-lg font-semibold">{{ current ? 'Editar comunicación' : 'Nueva comunicación' }}</h2>
    <button type="button" sgaButton color="secondary" variant="ghost" shape="pill" (click)="close()">
      <i class="fas fa-times"></i>
    </button>
  </header>
  <div class="grid gap-4">
    <div>
      <label class="label-form" for="subject">Asunto</label>
      <sga-input id="subject" formControlName="subject" placeholder="Asunto de la comunicación" />
    </div>
    <div>
      <label class="label-form" for="type">Tipo</label>
      <sga-select id="type" formControlName="type" [options]="typeOptions" placeholder="Tipo de comunicación" />
    </div>
    <div>
      <label class="label-form" for="body">Mensaje</label>
      <sga-input id="body" formControlName="body" placeholder="Contenido del mensaje" />
    </div>
    <div>
      <label class="label-form" for="scheduledAt">Programar envío</label>
      <sga-input id="scheduledAt" type="date" formControlName="scheduledAt" placeholder="Fecha de envío (opcional)" />
    </div>
  </div>
  <footer class="flex justify-end gap-2 mt-4">
    <button type="button" sgaButton color="secondary" variant="outline" (click)="close()">Cancelar</button>
    <button type="submit" sgaButton color="primary" [disabled]="form.invalid">Guardar</button>
  </footer>
</form>
