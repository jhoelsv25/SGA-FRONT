<z-select
  [class]="effectiveDisabled() ? 'pointer-events-none opacity-50' : ''"
  [zDisabled]="effectiveDisabled()"
  [zPlaceholder]="placeholder()"
  [zValue]="selectedItem()?.id || ''"
  (zSelectionChange)="onZardSelectionChange($event)"
>
  @for (item of allItems(); track item.id) {
    <z-select-item [zValue]="item.id">
      <div class="flex items-center gap-2">
        <div
          class="flex items-center justify-center w-6 h-6 rounded-full bg-primary/10 text-primary font-semibold text-xs shrink-0"
        >
          {{ getInitials(item) }}
        </div>
        <div class="flex flex-col min-w-0">
          <span class="font-medium text-sm">{{ getLabel(item) }}</span>
        </div>
      </div>
    </z-select-item>
  } @empty {
    <z-select-item zValue="" [zDisabled]="true">
      <span class="text-muted-foreground italic">{{
        loading() ? 'Cargando...' : 'No hay datos'
      }}</span>
    </z-select-item>
  }
</z-select>
