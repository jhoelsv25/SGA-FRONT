<sga-header-detail [config]="headerConfig" />

<div class="rounded-xl border border-slate-200 bg-white p-4">
  <div class="mb-4 flex flex-wrap items-end gap-3">
    <div>
      <label for="teacher-attendance-date" class="mb-1 block text-sm font-medium text-slate-700">Fecha</label>
      <sga-input
        id="teacher-attendance-date"
        type="date"
        [ngModel]="attendanceDate()"
        (ngModelChange)="onDateChange($event)"
      />
    </div>

    <button type="button" sgaButton color="primary" variant="outline" (click)="openManualDialog()">
      <i class="fas fa-plus mr-2"></i>
      Registro manual
    </button>

    <button type="button" sgaButton color="primary" variant="outline" (click)="openImportDialog()">
      <i class="fas fa-file-import mr-2"></i>
      Importar Excel
    </button>

    <button type="button" sgaButton color="primary" variant="outline" (click)="downloadTemplate()">
      <i class="fas fa-download mr-2"></i>
      Plantilla Excel
    </button>

    <button type="button" sgaButton color="secondary" variant="outline" (click)="loadTeachers()">
      <i class="fas fa-sync-alt mr-2"></i>
      Recargar
    </button>

    <div class="ml-auto flex items-center gap-2">
      <button
        type="button"
        sgaButton
        color="success"
        variant="outline"
        size="sm"
        [disabled]="saving() || loading()"
        (click)="saveManual()"
        class="!h-9"
        aria-label="Guardar asistencia manual"
      >
        @if (saving()) {
          <i class="fas fa-spinner fa-spin mr-2"></i>
        } @else {
          <i class="fas fa-save"></i>
        }
      </button>

      <button
        type="button"
        sgaButton
        color="danger"
        variant="outline"
        [disabled]="deleting() || loading() || !bulkDeleteMode() || !hasDeleteSelections()"
        (click)="deleteSelected()"
        aria-label="Eliminar seleccionados"
        class="!h-10 !w-10 !px-0 flex items-center justify-center"
      >
        @if (deleting()) {
          <i class="fas fa-spinner fa-spin mr-2"></i>
        } @else {
          <i class="fas fa-trash"></i>
        }
      </button>
    </div>
  </div>

  <div class="overflow-x-auto">
    <table class="w-full min-w-[860px] border-collapse">
      <thead>
        <tr class="border-b border-slate-200 bg-slate-50">
          <th class="w-12 px-3 py-2 text-center text-xs font-semibold uppercase tracking-wide text-slate-600">
            <div class="flex items-center justify-center">
              <label class="inline-flex items-center cursor-pointer group">
                <input
                  type="checkbox"
                  class="sr-only"
                  [checked]="allSelected()"
                  [indeterminate]="partialSelected()"
                  (change)="toggleAllSelection()"
                />
                <div
                  class="w-5 h-5 border-2 rounded flex items-center justify-center transition-all"
                  [class.bg-primary-500]="allSelected() || partialSelected()"
                  [class.border-primary-500]="allSelected() || partialSelected()"
                  [class.border-neutral-400]="!allSelected() && !partialSelected()"
                >
                  @if (allSelected()) {
                    <i class="fas fa-check text-white text-xs"></i>
                  } @else if (partialSelected()) {
                    <i class="fas fa-minus text-white text-xs"></i>
                  }
                </div>
              </label>
            </div>
          </th>
          <th class="px-3 py-2 text-left text-xs font-semibold uppercase tracking-wide text-slate-600">Codigo</th>
          <th class="px-3 py-2 text-left text-xs font-semibold uppercase tracking-wide text-slate-600">Docente</th>
          <th class="px-3 py-2 text-left text-xs font-semibold uppercase tracking-wide text-slate-600">Estado</th>
          <th class="px-3 py-2 text-left text-xs font-semibold uppercase tracking-wide text-slate-600">Hora entrada</th>
          <th class="px-3 py-2 text-left text-xs font-semibold uppercase tracking-wide text-slate-600">Observaciones</th>
          <th class="w-12 px-3 py-2 text-center text-xs font-semibold uppercase tracking-wide text-slate-600">
            Acciones
          </th>
        </tr>
      </thead>
      <tbody>
        @if (loading()) {
          <tr>
            <td colspan="7" class="px-3 py-8 text-center text-sm text-slate-500">
              Cargando docentes...
            </td>
          </tr>
        } @else if (rows().length === 0) {
          <tr>
            <td colspan="7" class="px-3 py-8 text-center text-sm text-slate-500">
              No hay docentes disponibles para registrar asistencia.
            </td>
          </tr>
        } @else {
          @for (row of rows(); track row.teacherId) {
            <tr class="border-b border-slate-100 align-top" [class.bg-amber-50]="row.dirty" [class.bg-rose-50]="row.markedForDelete">
              <td class="w-12 px-3 py-2 text-center align-middle">
                <label
                  class="inline-flex items-center justify-center w-full group"
                  [class.opacity-50]="isRowDeleteDisabled(row.teacherId)"
                >
                  <input
                    type="checkbox"
                    class="sr-only"
                    [checked]="row.markedForDelete"
                    (change)="toggleDelete(row.attendanceId, $event.target.checked)"
                  />
                  <div
                    class="w-5 h-5 border-2 rounded flex items-center justify-center transition-all"
                    [class.bg-primary-500]="row.markedForDelete"
                    [class.border-primary-500]="row.markedForDelete"
                    [class.border-neutral-400]="!row.markedForDelete"
                  >
                    @if (row.markedForDelete) {
                      <i class="fas fa-check text-white text-xs"></i>
                    }
                  </div>
                </label>
              </td>
              <td class="px-3 py-2 text-sm font-semibold text-slate-700">{{ row.teacherCode }}</td>
              <td class="px-3 py-2 text-sm text-slate-700">{{ row.teacherLabel }}</td>
              <td class="px-3 py-2">
                <div class="flex gap-2">
                  <button
                    type="button"
                    class="rounded px-2 py-1 text-xs font-semibold"
                    [class]="row.status === 'present' ? 'bg-green-600 text-white' : 'bg-green-50 text-green-700'"
                    [disabled]="isRowSyncing(row.teacherId)"
                    (click)="setStatus(row.teacherId, 'present')"
                  >P</button>
                  <button
                    type="button"
                    class="rounded px-2 py-1 text-xs font-semibold"
                    [class]="row.status === 'late' ? 'bg-amber-500 text-white' : 'bg-amber-50 text-amber-700'"
                    [disabled]="isRowSyncing(row.teacherId)"
                    (click)="setStatus(row.teacherId, 'late')"
                  >T</button>
                  <button
                    type="button"
                    class="rounded px-2 py-1 text-xs font-semibold"
                    [class]="row.status === 'absent' ? 'bg-rose-600 text-white' : 'bg-rose-50 text-rose-700'"
                    [disabled]="isRowSyncing(row.teacherId)"
                    (click)="setStatus(row.teacherId, 'absent')"
                  >F</button>
                  <button
                    type="button"
                    class="rounded px-2 py-1 text-xs font-semibold"
                    [class]="row.status === 'excused' ? 'bg-sky-600 text-white' : 'bg-sky-50 text-sky-700'"
                    [disabled]="isRowSyncing(row.teacherId)"
                    (click)="setStatus(row.teacherId, 'excused')"
                  >J</button>
                </div>
              </td>
              <td class="px-3 py-2">
                <sga-input
                  type="time"
                  [ngModel]="row.checkInTime.slice(0, 5)"
                  (ngModelChange)="updateCheckInTime(row.teacherId, $event)"
                />
              </td>
              <td class="px-3 py-2">
                <sga-input
                  [ngModel]="row.observations"
                  (ngModelChange)="updateObservations(row.teacherId, $event)"
                  placeholder="Observaciones"
                />
              </td>
              <td class="w-12 px-3 py-2 text-center align-middle">
                <button
                  type="button"
                  sgaButton
                  color="danger"
                  variant="ghost"
                  size="sm"
                  class="!h-9 !w-9 !px-0 flex items-center justify-center"
                  [disabled]="isRowDeleteDisabled(row.teacherId)"
                  (click)="deleteRow(row.teacherId)"
                  aria-label="Eliminar asistencia"
                >
                  <i class="fas fa-trash"></i>
                </button>
              </td>
            </tr>
          }
        }
      </tbody>
    </table>
  </div>
</div>
