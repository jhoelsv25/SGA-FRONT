<div class="p-6 max-w-7xl mx-auto">
  <z-list-toolbar
    title="Registro de Pagos"
    description="Administra pagos por estudiante, estado y vencimientos"
    icon="fas fa-money-bill-wave"
    [searchPlaceholder]="'Buscar por estudiante, concepto o referencia...'"
    [filterCount]="activeFiltersCount()"
    (refresh)="onRefresh()"
    (searchChange)="onSearch($event)"
  >
    <div list-toolbar-filter class="flex flex-col gap-4 min-w-[280px]">
      <h4 class="text-[10px] font-bold text-base-content/40 uppercase tracking-[0.2em] mb-1">Filtros</h4>
      <div class="flex flex-col gap-1.5">
        <label class="text-[11px] font-bold text-base-content/60 uppercase">Estado</label>
        <z-select-option [options]="statusOptions()" [value]="filters.paymentStatus()" (valueChange)="onStatusChange($event)"></z-select-option>
      </div>
    </div>
    <div list-toolbar-actions>
      <button z-button zType="ghost" zColor="secondary" zShape="circle" [disabled]="activeFiltersCount() === 0" (click)="clearFilters()">
        <i class="fas fa-filter-circle-xmark mr-2"></i>
        Limpiar
      </button>
      <button z-button zColor="primary" zShape="circle" (click)="openCreate()">
        <i class="fas fa-plus mr-2"></i>
        Registrar Pago
      </button>
    </div>
  </z-list-toolbar>

  <sga-data-source
    [data]="data()"
    [columns]="columns()"
    [loading]="loading()"
    [pagination]="pagination()"
    [actions]="rowActions()"
    (actionClick)="onRowAction($event)"
    (pageChange)="onPageChange($event)"
   />
</div>
