<sga-header-detail
  [config]="headerConfig()"
  [actions]="headerActions()"
  (action)="onHeaderAction($event)"
  (refresh)="onRefresh()"
/>

<div class="p-6 space-y-4">
  <sga-list-toolbar
    [searchPlaceholder]="'Buscar períodos por nombre...'"
    [filterCount]="filterCount()"
    (searchChange)="onSearch($event)"
  >
    <div list-toolbar-filter class="space-y-3 p-1">
      <p class="text-sm font-semibold text-base-content">Filtrar por estado</p>
      <select
        class="w-full px-3 py-2 rounded-xl border border-base-200 bg-base-100 text-sm"
        [value]="filterStatus()"
        (change)="onFilterStatus($event)"
      >
        <option value="">Todos</option>
        <option value="planned">Planificado</option>
        <option value="in_progress">En curso</option>
        <option value="completed">Completado</option>
        <option value="cancelled">Cancelado</option>
      </select>
    </div>
  </sga-list-toolbar>

  <div
    class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-3 gap-6 animate-in fade-in slide-in-from-bottom-4 duration-500"
  >
    @if (loading() && !data().length) {
      @for (i of skeletonItems; track i) {
        <sga-skeleton [customClass]="'h-[260px] w-full rounded-4xl border border-base-200'" />
      }
    } @else {
      @for (period of filteredData(); track period.id) {
        <sga-period-card
          [period]="period"
          (edit)="editPeriod(period)"
          (delete)="deletePeriod(period)"
        />
      } @empty {
        <div class="col-span-full">
          <sga-empty-state
            iconClass="fas fa-layer-group"
            title="Sin períodos académicos"
            description="Aún no hay períodos configurados. Crea trimestres, bimestres o semestres para el año académico."
            actionLabel="Crear primer período"
            (action)="createFromEmpty()"
          />
        </div>
      }
    }
  </div>
</div>
