<div class="flex flex-col md:flex-row gap-4">
  <div class="relative flex-1 group">
    <div class="absolute inset-y-0 left-6 flex items-center pointer-events-none z-10">
      <i class="fas fa-search text-base-content/20 group-focus-within:text-primary transition-colors"></i>
    </div>
    <input 
      type="text" 
      [ngModel]="search()" 
      (ngModelChange)="onSearchChange($event)"
      placeholder="Filtrar por términos..."
      class="w-full pl-14 pr-6 py-3 rounded-2xl bg-base-100 border border-base-200 shadow-md focus:outline-none focus:ring-4 focus:ring-primary/10 focus:border-primary transition-all text-sm font-medium placeholder:text-base-content/30"
    >
  </div>

  <div class="min-w-[200px]">
    <sga-select 
      [options]="actionOptions()"
      [placeholder]="'Todas las Acciones'"
      [ngModel]="action()"
      (ngModelChange)="actionChanged.emit($event)"
    />
  </div>
</div>
