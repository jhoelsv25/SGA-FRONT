<div class="p-6 space-y-6">
  <sga-list-toolbar
    title="Niveles de Grado"
    icon="fas fa-graduation-cap"
    description="Gestionar niveles de grado"
    [searchPlaceholder]="'Buscar niveles por nombre...'"
    [filterCount]="filterCount()"
    (searchChange)="onSearch($event)"
    (refresh)="onRefresh()"
  >
    <div list-toolbar-actions class="flex items-center gap-2">
      <sga-dropdown [items]="actionDropdownItems()">
        <button
          sga-dropdown-trigger
          class="flex items-center justify-center w-10 h-10 rounded-2xl border border-base-200 bg-base-100 hover:bg-base-200 transition-colors text-base-content/60 hover:text-primary"
          aria-label="Más acciones"
          type="button"
        >
          <i class="fas fa-ellipsis-h"></i>
        </button>
      </sga-dropdown>
    </div>
    <div list-toolbar-filter class="space-y-3 p-1">
      <p class="text-sm font-semibold text-base-content">Filtrar por nivel</p>
      <sga-select
        [options]="levelOptions"
        [value]="filterLevel() || null"
        [placeholder]="'Todos'"
        [clearable]="true"
        [searchable]="false"
        (valueChange)="onFilterLevel($event)"
      />
    </div>
  </sga-list-toolbar>

  <div
    class="grid grid-cols-1 mt-6 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-3 gap-6 animate-in fade-in slide-in-from-bottom-4 duration-500"
  >
    @if (loading() && !data().length) {
      @for (i of skeletonItems; track i) {
        <sga-skeleton [customClass]="'h-[220px] w-full rounded-4xl border border-base-200'" />
      }
    } @else {
      @for (gradeLevel of filteredData(); track gradeLevel.id) {
        <sga-grade-level-card
          [gradeLevel]="gradeLevel"
          (edit)="editGradeLevel(gradeLevel)"
          (delete)="deleteGradeLevel(gradeLevel)"
          (viewSections)="goToSections(gradeLevel)"
        />
      } @empty {
        <div class="col-span-full">
          <sga-empty-state
            iconClass="fas fa-graduation-cap"
            title="Sin niveles de grado"
            description="Aún no hay niveles de grado configurados. Crea el primero para organizar primaria, secundaria o superior."
            actionLabel="Crear primer nivel"
            (action)="createFromEmpty()"
          />
        </div>
      }
    }
  </div>
</div>
