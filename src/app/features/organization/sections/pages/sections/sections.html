<sga-header-detail
  [config]="headerConfig()"
  [actions]="headerActions()"
  (action)="onHeaderAction($event)"
  (refresh)="onRefresh()"
/>

<div class="p-6">
  <div
    class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-3 gap-6 animate-in fade-in slide-in-from-bottom-4 duration-500"
  >
    @if (loading() && !data().length) {
      @for (i of skeletonItems; track i) {
        <sga-skeleton [customClass]="'h-[220px] w-full rounded-2xl border border-base-200'" />
      }
    } @else {
      @for (section of data(); track section.id) {
        <sga-section-card
          [section]="section"
          (edit)="editSection(section)"
          (delete)="deleteSection(section)"
        />
      } @empty {
        <div class="col-span-full">
          <sga-empty-state
            iconClass="fas fa-layer-group"
            title="Sin secciones"
            description="Aún no hay secciones. Crea la primera y asígnala a un grado y año académico."
            actionLabel="Crear primera sección"
            (action)="createFromEmpty()"
          />
        </div>
      }
    }
  </div>
</div>
