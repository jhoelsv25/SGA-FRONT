<sga-header-detail
  [config]="headerConfig()"
  [actions]="headerActions()"
  (action)="onHeaderAction($event)"
  (refresh)="onRefresh()"
/>

<div class="p-6">
  <div
    class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-3 gap-6 animate-in fade-in slide-in-from-bottom-4 duration-500"
  >
    @if (loading() && !data().length) {
      @for (i of skeletonItems; track i) {
        <sga-skeleton [customClass]="'h-[220px] w-full rounded-2xl border border-base-200'" />
      }
    } @else {
      @for (sc of data(); track sc.id) {
        <sga-section-course-card
          [sectionCourse]="sc"
          (edit)="editSectionCourse(sc)"
          (delete)="deleteSectionCourse(sc)"
        />
      } @empty {
        <div class="col-span-full">
          <sga-empty-state
            iconClass="fas fa-chalkboard-teacher"
            title="Sin asignaciones"
            description="Aún no hay cursos asignados a secciones. Crea la primera asignación."
            actionLabel="Asignar curso a sección"
            (action)="createFromEmpty()"
          />
        </div>
      }
    }
  </div>
</div>
