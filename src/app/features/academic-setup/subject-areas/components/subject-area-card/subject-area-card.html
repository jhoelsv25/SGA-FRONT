<sga-card
  class="group flex flex-col h-full transition-all duration-300 border border-base-200/80 overflow-hidden bg-base-100 rounded-4xl shadow-sm"
>
  <div
    class="flex flex-col space-y-1.5 p-6 pb-5 border-b border-base-200/50 bg-linear-to-br from-base-200/5 to-transparent rounded-t-4xl"
  >
    <div class="flex justify-between items-start">
      <div
        class="flex flex-col items-center justify-center w-14 h-14 rounded-2xl shadow-sm border"
        [ngClass]="getTypeColor(subjectArea().type)"
      >
        <i class="fas fa-book-open text-xl"></i>
      </div>
      <div
        class="flex gap-1 opacity-0 group-hover:opacity-100 transition-opacity"
        role="group"
        (click)="$event.stopPropagation()"
      >
        <button
          sgaButton
          variant="ghost"
          size="sm"
          class="rounded-full h-9 w-9 p-0 hover:bg-base-200/60"
          (click)="edit.emit(subjectArea()); $event.stopPropagation()"
          title="Editar"
        >
          <i class="fas fa-edit text-xs"></i>
        </button>
        <button
          sgaButton
          variant="ghost"
          size="sm"
          class="rounded-full h-9 w-9 p-0 text-error hover:bg-error/10"
          (click)="delete.emit(subjectArea()); $event.stopPropagation()"
          title="Eliminar"
        >
          <i class="fas fa-trash text-xs"></i>
        </button>
      </div>
    </div>
    <h2
      class="mt-4 text-xl font-bold leading-tight tracking-tight text-base-content group-hover:text-primary transition-colors line-clamp-2"
    >
      {{ subjectArea().name }}
    </h2>
    @if (subjectArea().code) {
      <p class="text-xs font-mono text-primary/70 bg-primary/5 px-3 py-1 rounded-full border border-primary/20 mt-1 w-fit">
        {{ subjectArea().code }}
      </p>
    }
    <div class="flex flex-wrap items-center gap-2 mt-2">
      <span
        class="text-[10px] font-black uppercase tracking-widest px-3 py-1 rounded-full border"
        [ngClass]="getTypeColor(subjectArea().type)"
      >
        {{ getTypeLabel(subjectArea().type) }}
      </span>
      <span
        class="text-[10px] font-black uppercase tracking-widest px-3 py-1 rounded-full border"
        [ngClass]="getStatusColor(subjectArea().status)"
      >
        {{ getStatusLabel(subjectArea().status) }}
      </span>
    </div>
  </div>

  <div class="p-6 pt-5 grow">
    <div class="space-y-4">
      @if (subjectArea().description) {
        <p
          class="text-sm text-base-content/60 leading-relaxed line-clamp-4 px-4 py-3 rounded-2xl bg-base-200/10 border border-base-200/30 hover:bg-base-200/20 transition-colors"
        >
          {{ subjectArea().description }}
        </p>
      } @else {
        <div
          class="flex items-center gap-2 px-4 py-3 rounded-2xl bg-base-200/5 border border-base-200/20 text-base-content/40"
        >
          <i class="fas fa-align-left text-sm"></i>
          <span class="text-sm italic">Sin descripción</span>
        </div>
      }
    </div>
  </div>
</sga-card>
