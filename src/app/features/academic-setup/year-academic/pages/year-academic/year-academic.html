<sga-header-detail
  [config]="headerConfig()"
  [actions]="headerActions()"
  (action)="onHeaderAction($event)"
  (refresh)="onRefresh()"
/>

<div class="p-6">
  <div
    class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-3 gap-6 animate-in fade-in slide-in-from-bottom-4 duration-500"
  >
    @if (loading() && !data().length) {
      @for (i of skeletonItems; track i) {
        <sga-skeleton [customClass]="'h-[260px] w-full rounded-2xl border border-base-200'" />
      }
    } @else {
      @for (academicYear of data(); track academicYear.id) {
        <sga-year-academic-card
          [year]="academicYear"
          (viewDetail)="goToDetail(academicYear)"
          (edit)="editYear(academicYear)"
          (delete)="deleteYear(academicYear)"
          (createPeriod)="openPeriodForm(academicYear)"
        />
      } @empty {
        <div class="col-span-full">
          <sga-empty-state
            iconClass="fas fa-calendar-alt"
            title="Sin años académicos"
            description="Aún no hay años académicos configurados. Crea el primero para definir períodos y fechas del curso."
            actionLabel="Crear primer año académico"
            (action)="createFromEmpty()"
          />
        </div>
      }
    }
  </div>
</div>
