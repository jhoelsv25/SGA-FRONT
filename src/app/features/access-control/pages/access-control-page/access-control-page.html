<section class="mx-auto max-w-[1520px]">
  <div
    class="rounded-[2rem] border border-base-200/80 bg-base-100/90 p-6 shadow-[0_24px_80px_rgba(15,23,42,0.08)] backdrop-blur dark:shadow-[0_24px_80px_rgba(0,0,0,0.35)]"
  >
    <sga-access-control-header
      [date]="date()"
      [entryCount]="entryCount()"
      [exitCount]="exitCount()"
      (dateChange)="onDateChange($event)"
    />

    <div class="mt-8 grid gap-5 xl:grid-cols-[minmax(0,1.15fr)_420px]">
      <sga-access-control-live-panel
        [accessBlocked]="accessBlocked()"
        [eventType]="eventType()"
        [scanCode]="scanCode()"
        [notes]="notes()"
        [saving]="saving()"
        [resolvedPreview]="resolvedPreview()"
        [resolveError]="resolveError()"
        [resolving]="resolving()"
        (eventTypeChange)="setEventType($event)"
        (scanCodeChange)="onCodeChange($event)"
        (notesChange)="setNotes($event)"
        (resolveRequested)="resolveCode()"
        (submitRequested)="submitCode()"
      />

      <sga-access-control-sidebar
        [lastRegistered]="lastRegistered()"
        [needsLocationValidation]="needsLocationValidation()"
        [locationReady]="locationReady()"
        [geofenceStatus]="geofenceStatus()"
        [geoError]="geoError()"
        [locationHelpText]="locationHelpText()"
        (retryLocation)="retryLocation()"
      />
    </div>

    <sga-access-control-events-table [recentEvents]="recentEvents()" [todayCount]="todayCount()" />
  </div>
</section>
