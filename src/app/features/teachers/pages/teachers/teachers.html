<div class="space-y-6 p-6">
  <ng-template #filters>
    <div class="relative flex min-w-80 flex-col gap-5 rounded-[var(--radius-xl)] bg-card p-5">
      <div class="flex items-center justify-between border-b border-base-200 pb-3">
        <h3 class="text-xs font-bold uppercase tracking-widest text-base-content/50">Filtros</h3>
        @if (hasActiveFilters()) {
          <button
            type="button"
            class="text-xs font-semibold uppercase tracking-widest text-primary transition hover:opacity-80"
            (click)="clearFilters()"
          >
            Limpiar
          </button>
        }
      </div>

      <z-form-field>
        <label z-form-label>Buscar</label>
        <z-form-control>
          <input
            z-input
            [ngModel]="currentSearch()"
            placeholder="Buscar por nombre, código, correo o especialidad..."
            (ngModelChange)="onSearch($event)"
          />
        </z-form-control>
      </z-form-field>

      <z-form-field>
        <label z-form-label>Tipo de contrato</label>
        <z-form-control>
          <z-select-option
            [options]="contractTypeOptions"
            [ngModel]="filterContractType()"
            [placeholder]="'Todos'"
            [searchable]="false"
            (ngModelChange)="onFilterContractType($event)"
          ></z-select-option>
        </z-form-control>
      </z-form-field>

      <z-form-field>
        <label z-form-label>Régimen laboral</label>
        <z-form-control>
          <z-select-option
            [options]="laborRegimeOptions"
            [ngModel]="filterLaborRegime()"
            [placeholder]="'Todos'"
            [searchable]="false"
            (ngModelChange)="onFilterLaborRegime($event)"
          ></z-select-option>
        </z-form-control>
      </z-form-field>

      <z-form-field>
        <label z-form-label>Carga laboral</label>
        <z-form-control>
          <z-select-option
            [options]="workloadTypeOptions"
            [ngModel]="filterWorkloadType()"
            [placeholder]="'Todos'"
            [searchable]="false"
            (ngModelChange)="onFilterWorkloadType($event)"
          ></z-select-option>
        </z-form-control>
      </z-form-field>

      <z-form-field>
        <label z-form-label>Estado laboral</label>
        <z-form-control>
          <z-select-option
            [options]="employmentStatusOptions"
            [ngModel]="filterEmploymentStatus()"
            [placeholder]="'Todos'"
            [searchable]="false"
            (ngModelChange)="onFilterEmploymentStatus($event)"
          ></z-select-option>
        </z-form-control>
      </z-form-field>
    </div>
  </ng-template>

  <sga-header-detail
    [config]="headerConfig"
    [actions]="filteredHeaderActions()"
    [filterTemplate]="filters"
    [hasActiveFilters]="hasActiveFilters()"
    (action)="onHeaderAction($event)"
    (refresh)="onRefresh()"
  />

  <div class="grid grid-cols-1 gap-6 animate-in fade-in slide-in-from-bottom-4 duration-500">
    @if (loading() && !data().length) {
      @for (i of skeletonItems; track i) {
        <z-skeleton [class]="'h-[220px] w-full rounded-4xl border border-base-200'"></z-skeleton>
      }
    } @else {
      @for (teacher of filteredData(); track teacher.id) {
        <sga-teacher-card
          [teacher]="teacher"
          [canManage]="canManageTeachers()"
          (viewDetail)="goToDetail($event)"
          (edit)="editTeacher($event)"
          (delete)="deleteTeacher($event)"
          (viewAttendances)="goToTeacherAttendances($event)"
          (viewAssignments)="goToAssignments($event)"
          (viewSchedules)="goToSchedules($event)"
        />
      } @empty {
        <div class="col-span-full">
          <z-empty
            zIcon="graduation-cap"
            zTitle="Sin docentes"
            zDescription="Todavía no hay docentes registrados o no coinciden con los filtros aplicados."
          >
            @if (canManageTeachers()) {
              <button z-button type="button" class="mt-4" (click)="createFromEmpty()">
                Crear docente
              </button>
            }
          </z-empty>
        </div>
      }
    }
  </div>
</div>
