<sga-header-detail
  [config]="headerConfig()"
  [actions]="headerActions()"
  (action)="onHeaderAction($event)"
  (refresh)="onRefresh()"
/>

<div class="p-6">
  <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6 animate-in fade-in slide-in-from-bottom-4 duration-500">

    @if (loading() && !data().length) {
      <sga-institution-skeleton />
    } @else {
      @for (inst of data(); track inst.id) {
        <sga-institution-card
          [institution]="inst"
          (edit)="openForm(undefined, inst)"
          (delete)="deleteInstitution(inst.id)"
        />
      } @empty {
        <div class="grid grid-col-span-full">
          <sga-empty-state
            title="Sin instituciones registradas"
            description="Aún no tienes ninguna institución. Crea la primera para comenzar a gestionar tu sistema educativo."
            actionLabel="Crear primera institución"
            iconClass="fas fa-building"
            (action)="openForm()"
          />
        </div>
      }
    }

  </div>
</div>
