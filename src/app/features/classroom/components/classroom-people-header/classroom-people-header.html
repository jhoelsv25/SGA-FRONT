<section
  class="card-premium p-10 bg-gradient-to-br from-primary to-indigo-600 text-white border-none relative overflow-hidden"
>
  <div
    class="absolute top-0 right-0 w-64 h-64 bg-white/10 rounded-full -mr-32 -mt-32 blur-3xl"
  ></div>
  <div class="relative flex flex-col lg:flex-row lg:items-end lg:justify-between gap-6">
    <div class="space-y-2">
      <h2 class="text-3xl sm:text-4xl font-black tracking-tighter">Personas del aula</h2>
      <p class="text-white/60 font-bold uppercase tracking-[0.2em] text-[10px]">
        @if (profileType() === 'student') {
          Compañeros y docentes de tu curso
        } @else if (profileType() === 'guardian') {
          Estudiantes vinculados a tu cuenta
        } @else {
          Gestión de participantes del aula
        }
      </p>
    </div>

    <div class="flex items-center gap-4">
      <div
        class="px-6 py-3 rounded-2xl bg-white/10 backdrop-blur-xl border border-white/10 text-center"
      >
        <p class="text-[10px] font-black uppercase tracking-widest text-white/50">Docentes</p>
        <p class="text-2xl font-black">{{ teachersCount() }}</p>
      </div>
      <div
        class="px-6 py-3 rounded-2xl bg-white/10 backdrop-blur-xl border border-white/10 text-center"
      >
        <p class="text-[10px] font-black uppercase tracking-widest text-white/50">Estudiantes</p>
        <p class="text-2xl font-black">{{ studentsCount() }}</p>
      </div>
    </div>
  </div>
</section>
