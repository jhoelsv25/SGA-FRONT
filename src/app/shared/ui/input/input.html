<div class="relative w-full">
  <div class="relative flex items-center w-full">
    @if (type() === 'email') {
      <i
        class="fas fa-envelope absolute left-2.5 top-1/2 -translate-y-1/2 text-base-content/40 text-xs pointer-events-none w-4"
      ></i>
    }
    @if (type() === 'password') {
      <i
        class="fas fa-lock absolute left-2.5 top-1/2 -translate-y-1/2 text-base-content/40 text-xs pointer-events-none w-4"
      ></i>
    }
    @if (type() === 'date') {
      <i
        class="fas fa-calendar absolute left-2.5 top-1/2 -translate-y-1/2 text-base-content/40 text-xs pointer-events-none w-4"
      ></i>
    }
    @if (type() === 'tel') {
      <i
        class="fas fa-phone absolute left-2.5 top-1/2 -translate-y-1/2 text-base-content/40 text-xs pointer-events-none w-4"
      ></i>
    }

    <!-- Input Element -->
    <input
      #inputElement
      [id]="id()"
      [type]="type()"
      [placeholder]="placeholder()"
      [disabled]="disabled()"
      [min]="min()"
      [max]="max()"
      [value]="localValue"
      (input)="onInput($event)"
      (blur)="onBlur()"
      [class]="
        'flex h-10 w-full rounded-xl border border-base-300 bg-transparent px-3 py-2 text-sm text-base-content font-medium ' +
        'ring-offset-base-100 placeholder:text-base-content/50 placeholder:font-normal ' +
        'focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-primary/20 focus-visible:border-primary ' +
        'disabled:cursor-not-allowed disabled:opacity-50 transition-colors duration-200 ' +
        (hasIconPrefix() ? 'pl-8 ' : '') +
        customClass()
      "
    />

    <!-- Clear Button -->
    @if (localValue && !disabled()) {
      <button
        type="button"
        class="absolute right-2 flex items-center justify-center w-6 h-6 text-base-content/40 hover:text-base-content bg-base-100 hover:bg-base-200 rounded-md transition-all duration-200"
        (click)="clearInput()"
        tabindex="-1"
      >
        <i class="fas fa-xmark text-sm"></i>
      </button>
    }
  </div>

  <!-- Validation Error Text -->
  <small>
    @if (required() && !localValue && touched()) {
      <span class="text-xs text-error font-medium mt-1 block">* Este campo es requerido</span>
    }
  </small>
</div>
