<div class="relative w-full">
  <textarea
    #textareaElement
    [placeholder]="placeholder()"
    [disabled]="disabled()"
    [value]="localValue"
    (input)="onInput($event)"
    (blur)="onBlur()"
    [rows]="rows()"
    [class]="
        'flex min-h-[80px] w-full rounded-md border border-base-300 bg-transparent px-3 py-2 text-sm text-base-content ' +
        'ring-offset-base-100 placeholder:text-base-content/40 ' +
        'focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-primary/20 focus-visible:border-primary ' +
        'disabled:cursor-not-allowed disabled:opacity-50 transition-colors duration-200 ' + customClass()
    "
  ></textarea>

  <small>
    @if (required() && !localValue && touched()) {
      <span class="text-xs text-error font-medium mt-1 block">* Este campo es requerido</span>
    }
  </small>
</div>
