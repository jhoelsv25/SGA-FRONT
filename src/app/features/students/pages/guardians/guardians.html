<div class="p-6 max-w-7xl mx-auto">
  <sga-header-detail [config]="headerConfig" [actions]="headerActions()" (action)="onHeaderAction($event)" />
  @if (studentContextId()) {
  <div class="mb-6 rounded-4xl border border-primary/15 bg-primary/8 px-5 py-4 text-sm text-primary dark:bg-primary/10">
    <div class="flex flex-wrap items-center justify-between gap-3">
      <div class="space-y-1">
        <p class="text-[10px] font-black uppercase tracking-[0.24em] text-primary/70">
          Contexto de estudiante
        </p>
        <p class="font-semibold">
          Mostrando apoderados de
          <span class="font-black">{{ studentContextName() || 'estudiante seleccionado' }}</span>
        </p>
      </div>
      <button z-button zType="outline" type="button"
        class="h-9 rounded-xl px-4 text-[10px] font-black uppercase tracking-[0.18em]" (click)="clearStudentContext()">
        Ver todos
      </button>
    </div>
  </div>
  }
  <sga-data-source [data]="data()" [columns]="columns" [loading]="loading()" [pagination]="pagination()"
    [actions]="rowActions()" (actionClick)="onRowAction($event)" (pageChange)="onPageChange()" />
</div>
