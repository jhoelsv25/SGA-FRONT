<sga-header-detail
  [config]="headerConfig()"
  [actions]="headerActions()"
  (action)="onHeaderAction($event)"
  (refresh)="onRefresh()"
/>

<div class="p-6">
  <div
    class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-3 gap-6 animate-in fade-in slide-in-from-bottom-4 duration-500"
  >
    @if (loading() && !data().length) {
      @for (i of skeletonItems; track i) {
        <sga-skeleton [customClass]="'h-[220px] w-full rounded-2xl border border-base-200'" />
      }
    } @else {
      @for (course of data(); track course.id) {
        <sga-course-card
          [course]="course"
          (edit)="editCourse(course)"
          (delete)="deleteCourse(course)"
        />
      } @empty {
        <div class="col-span-full">
          <sga-empty-state
            iconClass="fas fa-book"
            title="Sin cursos"
            description="Aún no hay cursos configurados. Crea el primero para asignar a áreas y niveles."
            actionLabel="Crear primer curso"
            (action)="createFromEmpty()"
          />
        </div>
      }
    }
  </div>
</div>
